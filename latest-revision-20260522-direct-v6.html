<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Concrete Design Tool - Direct latest revision v6</title>
  <style>html,body{margin:0;min-height:100%;background:#f4f7f5;color:#17211d;font-family:system-ui,Segoe UI,Arial,sans-serif}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.loading b{color:#126b63}</style>
</head>
<body>
  <div class="loading"><div><b>Loading latest revision...</b><br>Direct v6 page, no iframe.</div></div>
  <script>
    (async function loadApp(){
      const stamp='20260522-direct-v6-'+Date.now();
      const response=await fetch('index.html?base='+stamp,{cache:'no-store'});
      const html=await response.text();
      const parsed=new DOMParser().parseFromString(html,'text/html');
      const scripts=[...parsed.scripts].filter((script)=>!/analysis-manual-fixes\.js/.test(script.getAttribute('src')||''));
      [...parsed.scripts].forEach((script)=>script.remove());
      document.head.innerHTML=parsed.head.innerHTML;
      document.body.innerHTML=parsed.body.innerHTML;
      for(const script of scripts) await loadScript(script,stamp);
      const patch=document.createElement('script');
      patch.textContent='('+patchApp.toString()+')();';
      document.body.appendChild(patch);
    })().catch((error)=>{document.body.innerHTML='<div class="loading"><div><b>Could not load latest revision.</b><br>'+String(error)+'</div></div>';});
    function loadScript(oldScript,stamp){return new Promise((resolve,reject)=>{const script=document.createElement('script'); if(oldScript.src){const src=oldScript.getAttribute('src'); script.src=src+(src.includes('?')?'&':'?')+'fresh='+stamp; script.onload=resolve; script.onerror=reject;} else {script.textContent=oldScript.textContent; setTimeout(resolve,0);} document.body.appendChild(script); if(!oldScript.src) resolve();});}

    function patchApp(){
      const id=(name)=>document.getElementById(name);
      const st=()=>{try{return state;}catch{return null;}};
      const n=(v,f)=>{const x=Number(v);return Number.isFinite(x)?x:f;};
      const sum=(a)=>(a||[]).reduce((s,v)=>s+Math.max(.5,Number(v)||.5),0);
      hideRemovedInputs();
      setupXSpanRows();
      patchNoModelJump();
      patchReadInputs();
      patchMultiSpanPlate();
      patchReviewPanels();
      try{if(typeof safeRun==='function') safeRun();}catch{}
      window.__directLatestV6Ready=true;

      function hideRemovedInputs(){
        const defaults={columnsBelowLayout:'grid',columnsBelowSpacingX:'1.5',columnsBelowSpacingY:'1.5'};
        Object.entries(defaults).forEach(([name,value])=>{const el=id(name); if(!el)return; el.value=el.value||value; const label=el.closest('label'); if(label) label.style.display='none'; try{el.type='hidden';}catch{}});
      }

      function getXSpans(){
        const app=st();
        if(app&&Array.isArray(app.twoWaySpansX)&&app.twoWaySpansX.length) return app.twoWaySpansX;
        if(Array.isArray(window.__directXSpans)&&window.__directXSpans.length) return window.__directXSpans;
        const existing=[...document.querySelectorAll('#panelXSpans input')].map((el)=>Math.max(.5,n(el.value,.5))).filter(Boolean);
        window.__directXSpans=existing.length?existing:[Math.max(.5,n(id('panelX')?.value,8))];
        return window.__directXSpans;
      }
      function setXSpans(spans){
        const clean=spans.map((span)=>Math.max(.5,Number(span)||.5));
        window.__directXSpans=clean;
        const app=st(); if(app) app.twoWaySpansX=clean.slice();
        if(id('panelX')) id('panelX').value=sum(clean).toFixed(1);
      }
      function setupXSpanRows(){
        renderXSpanRows();
        const add=id('addPanelXSpanBtn');
        if(add&&add.dataset.directSingleSpan!=='1'){
          add.dataset.directSingleSpan='1';
          add.addEventListener('click',(event)=>{event.preventDefault(); event.stopImmediatePropagation(); const spans=getXSpans().slice(); spans.push(spans.at(-1)||8); setXSpans(spans); renderXSpanRows(); try{if(typeof renderPtProfile==='function')renderPtProfile(); if(typeof safeRun==='function')safeRun();}catch{}},true);
        }
        const addY=id('addPanelYSpanBtn');
        if(addY&&addY.dataset.directSingleSpan!=='1'){
          addY.dataset.directSingleSpan='1';
          addY.addEventListener('click',(event)=>{event.preventDefault(); event.stopImmediatePropagation();},true);
        }
      }
      function renderXSpanRows(){
        const box=id('panelXSpans'); if(!box) return;
        const spans=getXSpans(); setXSpans(spans);
        box.innerHTML=spans.map((span,i)=>`<div class="span-row compact-span-row"><label>X span ${i+1} (m)<input type="number" min="0.5" step="0.1" value="${Math.max(.5,Number(span)||.5).toFixed(1)}" data-direct-x-span="${i}"></label><button type="button" title="Remove X span" data-direct-remove-x="${i}">x</button></div>`).join('');
        box.querySelectorAll('[data-direct-x-span]').forEach((el)=>el.addEventListener('change',()=>{const spans=getXSpans().slice(); spans[Number(el.dataset.directXSpan)]=Math.max(.5,n(el.value,.5)); setXSpans(spans); renderXSpanRows(); try{if(typeof safeRun==='function')safeRun();}catch{}}));
        box.querySelectorAll('[data-direct-remove-x]').forEach((el)=>el.addEventListener('click',(event)=>{event.preventDefault(); event.stopImmediatePropagation(); const spans=getXSpans().slice(); if(spans.length>1) spans.splice(Number(el.dataset.directRemoveX),1); setXSpans(spans); renderXSpanRows(); try{if(typeof safeRun==='function')safeRun();}catch{}},true));
      }

      function xSpans(input={}){const app=st(); const raw=Array.isArray(input.twoWaySpansX)&&input.twoWaySpansX.length?input.twoWaySpansX:Array.isArray(app?.twoWaySpansX)&&app.twoWaySpansX.length?app.twoWaySpansX:getXSpans(); const spans=raw.map((span)=>Math.max(.5,Number(span)||.5)); const total=sum(spans); const target=Math.max(.5,Number(input.panelX)||total||1); if(Math.abs(total-target)>.05){const scale=target/Math.max(total,.5); return spans.map((span)=>Math.max(.5,span*scale));} return spans;}

      function patchNoModelJump(){const button=id('runAnalysisBtn'); if(!button||button.dataset.directNoJump==='1')return; button.dataset.directNoJump='1'; button.addEventListener('click',(event)=>{const active=document.querySelector('.tab.active')?.dataset.view||'model'; event.preventDefault(); event.stopImmediatePropagation(); if(typeof safeRun==='function')safeRun(); if(typeof switchTab==='function')switchTab(active); renderXSpanRows();},true);}
      function patchReadInputs(){if(typeof readInputs!=='function'||readInputs.directLatestV6)return; const base=readInputs; readInputs=function(){const data=base.apply(this,arguments); if(data?.memberType==='twoWay'){data.twoWaySpansX=xSpans(data); data.twoWaySpansY=[Math.max(.5,n(id('panelY')?.value,data.panelY||7))]; data.panelX=sum(data.twoWaySpansX); data.panelY=data.twoWaySpansY[0]; data.columnsBelowLayout='grid'; data.columnsBelowSpacingX=1.5; data.columnsBelowSpacingY=1.5;} return data;}; readInputs.directLatestV6=true;}
      function patchMultiSpanPlate(){if(typeof plateGridDeflection!=='function'||plateGridDeflection.directLatestV6)return; const base=plateGridDeflection; plateGridDeflection=function(input,qLoad,options={}){const spans=xSpans(input); if(input?.memberType!=='twoWay'||input.__singleSpanPlate||spans.length<=1){const plate=base(input,qLoad,options); if(input?.memberType==='twoWay')plate.xSpanLengths=spans; return plate;} const points=[],xProfile=[]; let offset=0,maxDeflectionM=0,maxAt={x:spans[0]/2,y:Math.max(Number(input.panelY||1),1)/2},governing=null; spans.forEach((span,spanIndex)=>{const plate=base({...input,panelX:span,twoWaySpansX:[span],__singleSpanPlate:true},qLoad,options); (plate.points||[]).forEach((p)=>points.push({...p,x:p.x+offset,localX:p.x,spanIndex})); (plate.xProfile||[]).forEach((p,i)=>{if(spanIndex>0&&i===0)return; xProfile.push({...p,x:p.x+offset,localX:p.x,spanIndex,spanLength:span});}); if(Math.abs(plate.maxDeflectionM||0)>Math.abs(maxDeflectionM)){maxDeflectionM=Math.abs(plate.maxDeflectionM||0); maxAt={x:offset+(plate.maxAt?.x||span/2),y:plate.maxAt?.y||input.panelY/2}; governing=plate;} offset+=span;}); return {grid:governing?.grid||input.plateGrid||18,stiffnessModifier:governing?.stiffnessModifier||1,restraintModifier:governing?.restraintModifier||1,points,maxDeflectionM,maxAt,xProfile,yProfile:governing?.yProfile||[],xSpanLengths:spans};}; plateGridDeflection.directLatestV6=true;}
      function patchReviewPanels(){if(typeof drawLimitDiagrams==='function') drawLimitDiagrams=function(){const result=st()?.result; if(!result)return; if(result.mode==='twoWay')return drawTwoWayDeflectionOnly(result); return drawLineDeflectionClear(result);}; if(typeof drawTwoWayDiagrams==='function') drawTwoWayDiagrams=function(){const result=st()?.result; if(result?.mode!=='twoWay')return; const canvas=id('diagramCanvas'); if(!canvas?.getContext)return; canvas.width=1400; canvas.height=900; const ctx=canvas.getContext('2d'); wipe(ctx,canvas); title(ctx,'Moments / Shear Review','Flexure strip checks and punching shear are separated so labels do not clash.',42,48); barChart(ctx,result.twoWay.strips||[],70,365,250,650); const row=as3600Punching(result.twoWay.supportShear); punchingSketch(ctx,result.input,760,136,560,320,row); if(row)gauge(ctx,row,790,540,500,90,'AS 3600 punching shear demand / capacity');};}
      function drawTwoWayDeflectionOnly(result){const canvas=id('limitCanvas'); if(!canvas?.getContext)return; canvas.width=1400; canvas.height=760; const ctx=canvas.getContext('2d'); wipe(ctx,canvas); title(ctx,'Deflection Review','Long-term deflection is drawn span by span. Punching shear is shown only in Moments / Shear.',42,48); const samples=twoWayDeflectionSamples(result.input,result.twoWay); summary(ctx,42,86,samples,result.input); drawDeflection(ctx,samples,result.input,92,410,250,canvas.width);}
      function drawLineDeflectionClear(result){const canvas=id('limitCanvas'); if(!canvas?.getContext)return; canvas.width=1400; canvas.height=900; const ctx=canvas.getContext('2d'); wipe(ctx,canvas); const input=result.input, service=result.service, deflection=result.deflection; const samples=(deflection.longSamples||[]).map((s,i)=>{const short=Math.abs((deflection.shortSamples?.[i]?.shortDefl||service.samples?.[i]?.defl||0)*1000); const long=Math.abs((s.defl||0)*1000); return {x:s.x,shortMm:short,longMm:long,incrementalMm:Math.max(0,long-short),limitMm:lineLimitAt(input,service.x,s.x)};}); title(ctx,'Deflection Review','Beam and one-way deflection labels are separated from the stress diagram below.',42,48); drawDeflection(ctx,samples,input,70,155,205,canvas.width); if(typeof stressSamples==='function'&&typeof drawStressLimitDiagram==='function')drawStressLimitDiagram(ctx,canvas,stressSamples(input,service.samples),70,705,260,'Selected service case elastic concrete stress checks','#126b63','#bd5b32');}
      function twoWayDeflectionSamples(input,twoWay){const shortProfile=twoWay?.shortPlate?.xProfile||[]; const longProfile=twoWay?.longPlate?.xProfile||shortProfile; const spans=xSpans(input); const total=sum(spans)||Math.max(Number(input.panelX)||1,1); const profileTotal=Math.max(shortProfile.at(-1)?.x||0,longProfile.at(-1)?.x||0,Number(input.panelX)||total,1); return shortProfile.map((p,i)=>{const x=(Number(p.x||0)/profileTotal)*total; const shortMm=Math.abs(Number(p.defl||0)*1000); const longMm=Math.abs(Number(longProfile[i]?.defl??p.defl??0)*1000); return {x,shortMm,longMm,incrementalMm:Math.max(0,longMm-shortMm),limitMm:twoWayLimitAt(input,spans,x)};});}
      function twoWayLimitAt(input,spans,x){const ratio=Math.max(Number(input.deflectionRatio||250),1); let start=0; for(const span of spans){if(x<=start+span+1e-9)return span*1000/ratio; start+=span;} return ((spans.at(-1)||input.panelX||1)*1000)/ratio;}
      function lineLimitAt(input,nodes,x){const spans=input.spans||[{length:input.panelX||1}]; let start=0; for(const span of spans){const L=Math.max(.5,Number(span.length)||.5); if(x<=start+L+1e-9)return L*1000/Math.max(Number(input.deflectionRatio||250),1); start+=L;} return Math.max(.5,Number(spans.at(-1)?.length)||1)*1000/Math.max(Number(input.deflectionRatio||250),1);}
      function drawDeflection(ctx,samples,input,pad,axisY,height,width){if(!samples.length)return; const total=samples.at(-1).x||1,max=Math.max(1,...samples.map((s)=>Math.max(s.longMm,s.limitMm))),xScale=(width-2*pad)/total,yScale=height/max,bottom=axisY+height; line(ctx,pad,axisY,width-pad,axisY,'#cfd8d1',1.5); markers(ctx,input,pad,axisY,height,xScale); poly(ctx,samples,(s)=>pad+s.x*xScale,(s)=>axisY+s.limitMm*yScale,'#a16207',[8,6]); poly(ctx,samples,(s)=>pad+s.x*xScale,(s)=>axisY+s.longMm*yScale,'#bd5b32'); const gp=samples.reduce((best,s)=>s.longMm>best.longMm?s:best,samples[0]); label(ctx,`long-term ${gp.longMm.toFixed(2)} mm`,Math.min(width-pad-170,pad+gp.x*xScale+12),axisY+gp.longMm*yScale-10,'#bd5b32',14); label(ctx,`incremental max ${Math.max(...samples.map((s)=>s.incrementalMm)).toFixed(2)} mm`,pad,bottom+76,'#bd5b32',15); label(ctx,'long-term',pad+250,bottom+106,'#bd5b32',13); label(ctx,'allowable',pad+380,bottom+106,'#a16207',13);}
      function markers(ctx,input,pad,axisY,height,xScale){const spans=input.memberType==='twoWay'?xSpans(input):(input.spans||[]).map((s)=>Math.max(.5,Number(s.length)||.5)); let x=0; spans.slice(0,-1).forEach((span)=>{x+=span; line(ctx,pad+x*xScale,axisY-8,pad+x*xScale,axisY+height+8,'rgba(96,112,106,.32)',1);}); x=0; spans.forEach((span,i)=>{if(i===0)support(ctx,pad,axisY+height+12,input.memberType==='twoWay'?'C1':'S1'); x+=span; support(ctx,pad+x*xScale,axisY+height+12,input.memberType==='twoWay'?`C${i+2}`:`S${i+2}`); if(spans.length>1)label(ctx,`span ${i+1}: ${span.toFixed(1)} m`,pad+(x-span/2)*xScale-38,axisY+height+50,'#60706a',11);});}
      function summary(ctx,x,y,samples,input){const longMax=Math.max(0,...samples.map((s)=>s.longMm)),incMax=Math.max(0,...samples.map((s)=>s.incrementalMm)),limit=Math.min(...samples.map((s)=>s.limitMm)); card(ctx,x,y,1290,86); [[`Long-term`,`${longMax.toFixed(2)} mm`],[`Incremental`,`${incMax.toFixed(2)} mm`],[`Allowable`,`L/${input.deflectionRatio} = ${limit.toFixed(1)} mm`],[`Status`,longMax<=limit?'OK':'Review']].forEach(([a,b],i)=>{label(ctx,a,x+16+i*320,y+30,'#60706a',13); label(ctx,b,x+16+i*320,y+60,'#17211d',20);});}
      function as3600Punching(rows){return(rows||[]).find((row)=>/AS 3600/i.test(row.zone||''))||(rows||[])[0];}
      function barChart(ctx,rows,x,axisY,height,width){if(!rows.length)return; label(ctx,'X-direction column and middle strip flexure',x,axisY-height-32,'#17211d',18); const max=Math.max(1,...rows.map((r)=>Math.max(Math.abs(r.Mu||0),Math.abs(r.phiMu||0)))),group=width/rows.length; rows.forEach((r,i)=>{const gx=x+i*group+12,dh=(Math.abs(r.Mu||0)/max)*height,ch=(Math.abs(r.phiMu||0)/max)*height; ctx.fillStyle='#bd5b32'; ctx.fillRect(gx,axisY-dh,group*.25,dh); ctx.fillStyle='#126b63'; ctx.fillRect(gx+group*.34,axisY-ch,group*.25,ch); label(ctx,String(r.zone||'').replace(/^X /,''),gx,axisY+24,'#60706a',11);});}
      function punchingSketch(ctx,input,x,y,w,h,row){label(ctx,'Punching shear plan',x,y-34,'#17211d',17); const planW=330,cx=x+planW/2,cy=y+h/2; ctx.fillStyle='#f7fbff'; ctx.strokeStyle='#17211d'; ctx.lineWidth=2; ctx.fillRect(x,y,planW,h); ctx.strokeRect(x,y,planW,h); const colW=Math.max(42,Math.min(100,(Number(input.columnX||450)/1000)*160)),colH=Math.max(42,Math.min(100,(Number(input.columnY||450)/1000)*160)); ctx.fillStyle='rgba(96,112,106,.28)'; ctx.fillRect(cx-colW/2,cy-colH/2,colW,colH); ctx.strokeStyle='#60706a'; ctx.strokeRect(cx-colW/2,cy-colH/2,colW,colH); ctx.setLineDash([8,6]); ctx.strokeStyle='#bd5b32'; ctx.strokeRect(cx-colW/2-42,cy-colH/2-42,colW+84,colH+84); ctx.setLineDash([]); const ix=x+planW+26; label(ctx,`${Number(input.columnX||0).toFixed(0)} x ${Number(input.columnY||0).toFixed(0)} mm column`,ix,y+28,'#17211d',14); label(ctx,'critical shear perimeter',ix,y+58,'#bd5b32',14); label(ctx,`effective depth d = ${Number(input.d||0).toFixed(0)} mm`,ix,y+88,'#60706a',14); if(row)label(ctx,`utilisation ${(row.util*100).toFixed(0)}%`,ix,y+128,row.util<=1?'#126b63':'#bd5b32',14);}
      function gauge(ctx,row,x,y,w,h,titleText){label(ctx,titleText,x,y-30,'#17211d',17); const util=Math.max(0,row.Mu||0)/Math.max(1,row.phiMu||1); card(ctx,x,y,w,h); ctx.fillStyle=util<=1?'#126b63':'#bd5b32'; ctx.fillRect(x,y,Math.min(w,w*util),h); label(ctx,`${(row.Mu||0).toFixed(1)} / ${(row.phiMu||0).toFixed(1)} kN (${(util*100).toFixed(0)}%)`,x+w/2-120,y+h/2+6,'#17211d',16);}
      function wipe(ctx,canvas){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);} function title(ctx,h,s,x,y){label(ctx,h,x,y,'#17211d',26); label(ctx,s,x,y+28,'#60706a',15);} function card(ctx,x,y,w,h){ctx.fillStyle='#fff';ctx.strokeStyle='rgba(23,33,29,.14)';ctx.beginPath(); if(ctx.roundRect)ctx.roundRect(x,y,w,h,8); else ctx.rect(x,y,w,h); ctx.fill(); ctx.stroke();} function label(ctx,t,x,y,c,size){ctx.fillStyle=c;ctx.font=`${size}px system-ui`;ctx.fillText(String(t),x,y);} function line(ctx,x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();} function poly(ctx,samples,xf,yf,c,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=3;ctx.setLineDash(dash||[]);ctx.beginPath();samples.forEach((s,i)=>{const x=xf(s),y=yf(s); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);});ctx.stroke();ctx.restore();} function support(ctx,x,y,t){line(ctx,x,y-12,x,y+10,'#60706a',1.5); line(ctx,x-8,y+10,x+8,y+10,'#60706a',1.5); label(ctx,t,x-8,y+25,'#60706a',10);}
    }
  </script>
</body>
</html>
