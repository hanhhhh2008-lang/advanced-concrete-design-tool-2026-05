<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advanced Concrete Design Tool - Latest two-way strip fix</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f4f7f5;
        color: #17211d;
        font-family: system-ui, Segoe UI, Arial, sans-serif;
      }
      .loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      .loading b {
        color: #126b63;
      }
    </style>
  </head>
  <body>
    <div class="loading">
      <div><b>Loading latest revision...</b><br />Two-way strip width and flexure logic are being patched.</div>
    </div>
    <script>
      (async function loadApp() {
        const response = await fetch("index.html?base=20260522-two-way-strip-fix", { cache: "no-store" });
        const html = await response.text();
        const parsed = new DOMParser().parseFromString(html, "text/html");
        const scripts = [...parsed.scripts].filter((script) => !/analysis-manual-fixes\.js/.test(script.getAttribute("src") || ""));
        [...parsed.scripts].forEach((script) => script.remove());
        document.head.innerHTML = parsed.head.innerHTML;
        document.body.innerHTML = parsed.body.innerHTML;
        for (const script of scripts) await loadScript(script);
        const patch = document.createElement("script");
        patch.textContent = "(" + patchApp.toString() + ")();";
        document.body.appendChild(patch);
      })().catch(function showError(error) {
        document.body.innerHTML = '<div class="loading"><div><b>Could not load latest revision.</b><br>' + String(error) + "</div></div>";
      });

      function loadScript(oldScript) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          if (oldScript.src) {
            script.src = oldScript.getAttribute("src");
            script.onload = resolve;
            script.onerror = reject;
          } else {
            script.textContent = oldScript.textContent;
            setTimeout(resolve, 0);
          }
          document.body.appendChild(script);
          if (!oldScript.src) resolve();
        });
      }

      function patchApp() {
        const id = (name) => document.getElementById(name);
        const appState = () => {
          try {
            return state;
          } catch {
            return null;
          }
        };
        const number = (value, fallback) => {
          const n = Number(value);
          return Number.isFinite(n) ? n : fallback;
        };
        const clampLocal = (value, min, max) => Math.max(min, Math.min(max, Number(value) || 0));
        const sumSpans = (spans) => (spans || []).reduce((sum, span) => sum + Math.max(0.5, Number(span) || 0.5), 0);

        try {
          patchNoModelJump();
        } catch {}
        try {
          patchTwoWayInputs();
        } catch {}
        try {
          patchTwoWayFlexure();
        } catch {}
        try {
          patchTwoWayModel();
        } catch {}
        try {
          patchPtProfileDepth();
        } catch {}
        try {
          if (typeof safeRun === "function") safeRun();
        } catch {}
        window.__twoWayStripFlexureFixReady = true;
        window.__ptDepthAlignmentFixReady = true;

        function activeView() {
          return document.querySelector(".tab.active")?.dataset.view || document.querySelector(".view.active")?.id?.replace(/^view-/, "") || "model";
        }

        function syncTwoWayInputs() {
          const st = appState();
          if (!st || (id("memberType")?.value || "twoWay") !== "twoWay") return;
          const xInput = id("panelX");
          const yInput = id("panelY");
          const widthInput = id("width");
          const panelX = Math.max(0.5, number(xInput?.value, 8));
          const panelY = Math.max(0.5, number(yInput?.value, 7));
          if (!Array.isArray(st.twoWaySpansX) || !st.twoWaySpansX.length) st.twoWaySpansX = [panelX];
          const current = sumSpans(st.twoWaySpansX);
          if (st.twoWaySpansX.length === 1) {
            st.twoWaySpansX = [panelX];
          } else if (Math.abs(current - panelX) > 0.05) {
            const scale = panelX / Math.max(current, 0.5);
            st.twoWaySpansX = st.twoWaySpansX.map((span) => Math.max(0.5, Number(span) * scale));
          }
          st.twoWaySpansY = [panelY];
          if (widthInput) widthInput.value = Math.round(panelY * 1000);
        }

        function patchNoModelJump() {
          const button = id("runAnalysisBtn");
          if (!button || button.dataset.noModelJumpPatch === "1") return;
          button.dataset.noModelJumpPatch = "1";
          button.addEventListener(
            "click",
            (event) => {
              const view = activeView();
              event.preventDefault();
              event.stopImmediatePropagation();
              if (typeof safeRun === "function") safeRun();
              if (typeof switchTab === "function") switchTab(view);
            },
            true
          );
          window.__noModelJumpPatchReady = true;
        }

        function patchTwoWayInputs() {
          if (typeof readInputs !== "function" || readInputs.twoWayStripWidthFix) return;
          ["panelX", "panelY"].forEach((name) => {
            const el = id(name);
            if (!el) return;
            ["input", "change"].forEach((eventName) => {
              el.addEventListener(
                eventName,
                () => {
                  syncTwoWayInputs();
                  if (typeof safeRun === "function") safeRun();
                },
                true
              );
            });
          });
          const baseReadInputs = readInputs;
          readInputs = function () {
            syncTwoWayInputs();
            const data = baseReadInputs.apply(this, arguments);
            if (data?.memberType === "twoWay") {
              data.panelX = Math.max(0.5, number(id("panelX")?.value, data.panelX || 8));
              data.panelY = Math.max(0.5, number(id("panelY")?.value, data.panelY || 7));
              data.b = Math.round(data.panelY * 1000);
              data.designStripWidth = data.panelY;
              data.twoWaySpansX = (appState()?.twoWaySpansX || [data.panelX]).slice();
              if (typeof sectionProperties === "function") {
                data.sectionProperties = sectionProperties(data);
                data.Agross = data.sectionProperties.area;
                data.sectionCentroid = data.sectionProperties.centroid;
                data.Igross = data.sectionProperties.inertia;
              }
              if (typeof selfWeightAreaLoad === "function") data.selfWeightLoad = selfWeightAreaLoad(data);
              data.transferAreaLoad = Math.max(0, data.transferLoadKn || 0) / Math.max(data.panelX * data.panelY, 1e-9);
              if (typeof ptEffectiveForce === "function") data.ptEffectiveForce = ptEffectiveForce(data);
            }
            return data;
          };
          readInputs.twoWayStripWidthFix = true;
          syncTwoWayInputs();
        }

        function patchTwoWayFlexure() {
          if (typeof designTwoWayStrips !== "function" || designTwoWayStrips.twoWayLoadShareFix) return;
          designTwoWayStrips = function (input, wu, plate) {
            const lx = Math.max(0.5, Number(input.panelX) || 0.5);
            const ly = Math.max(0.5, Number(input.panelY) || 0.5);
            const short = Math.min(lx, ly);
            const aspect = Math.max(lx, ly) / Math.max(short, 0.5);
            const colFrac = clampLocal((input.columnStripPercent || 50) / 100, 0.2, 0.8);
            const fixity = typeof connectionFixityRatio === "function" ? connectionFixityRatio(input) : clampLocal((input.columnFixity || 50) / 100, 0, 1);
            const factors = typeof twoWayStripDistributionFactors === "function"
              ? twoWayStripDistributionFactors(fixity)
              : { columnNegative: 0.7, columnPositive: 0.6, middlePositive: 0.41, middleNegative: 0.21 };
            const xShare = twoWayXLoadShare(lx, ly);
            const totalMoment = typeof equivalentFrameStaticMoment === "function" ? equivalentFrameStaticMoment(wu * xShare, lx, ly) : (wu * xShare * ly * lx * lx) / 8;
            const columnWidth = ly * colFrac;
            const middleWidth = Math.max(ly - columnWidth, ly * 0.1);
            const rows = [];
            [
              { strip: "column strip", sign: "negative", frac: factors.columnNegative, width: columnWidth },
              { strip: "column strip", sign: "positive", frac: factors.columnPositive, width: columnWidth },
              { strip: "middle strip", sign: "positive", frac: factors.middlePositive, width: middleWidth },
              { strip: "middle strip", sign: "negative", frac: factors.middleNegative, width: middleWidth },
            ].forEach((item) => {
              const Mu = Math.abs((totalMoment * item.frac) / Math.max(item.width, 0.1));
              const stripInput = { ...input, memberType: "slab", b: 1000, d: input.d };
              const face = item.sign === "negative" ? "top" : "bottom";
              const phi = typeof flexurePhi === "function" ? flexurePhi(stripInput) : 0.85;
              const asReq = typeof requiredSteel === "function" ? requiredSteel(stripInput, Mu / phi, face) : 0;
              const provided = typeof chooseReo === "function" ? chooseReo(stripInput, asReq, face) : { text: "check reinforcement", as: 0 };
              const phiMu = typeof momentCapacity === "function" ? phi * momentCapacity(stripInput, provided.as || 0, face) : 0;
              rows.push({
                zone: "X " + item.strip,
                location: item.sign,
                face,
                Mu,
                phiMu,
                asReq,
                provided,
                util: phiMu > 0 ? Mu / phiMu : Infinity,
                deflection: (plate?.maxDeflectionM || 0) * 1000,
                limit: (short * 1000) / Math.max(input.deflectionRatio || 250, 1),
                deflectionOk: (plate?.maxDeflectionM || 0) * 1000 <= (short * 1000) / Math.max(input.deflectionRatio || 250, 1),
                check: `X-direction equivalent strip, ${item.width.toFixed(2)} m ${item.strip}, two-way load share ${(xShare * 100).toFixed(0)}%, aspect ${aspect.toFixed(2)}, column fixity ${(input.columnFixity || 0).toFixed(0)}%`,
              });
            });
            return rows;
          };
          designTwoWayStrips.twoWayLoadShareFix = true;
        }

        function twoWayXLoadShare(lx, ly) {
          const lx4 = Math.pow(Math.max(lx, 0.5), 4);
          const ly4 = Math.pow(Math.max(ly, 0.5), 4);
          return clampLocal(ly4 / Math.max(lx4 + ly4, 1e-9), 0.2, 1);
        }

        function patchPtProfileDepth() {
          if (typeof drawPtInputPreview !== "function" || drawPtInputPreview.ptDepthAlignmentFix) return;
          drawPtInputPreview = function () {
            drawAlignedPtProfile();
          };
          drawPtInputPreview.ptDepthAlignmentFix = true;
          ["depth", "ptTopCover", "ptBottomCover", "ptDuctDiameter", "ptEnabled", "memberType", "panelX"].forEach((name) => {
            const el = id(name);
            if (!el || el.dataset.ptDepthAlignmentFix === "1") return;
            el.dataset.ptDepthAlignmentFix = "1";
            ["input", "change"].forEach((eventName) => {
              el.addEventListener(eventName, () => {
                try {
                  drawAlignedPtProfile();
                  if (typeof renderPtProfileSummary === "function") renderPtProfileSummary();
                } catch {}
              });
            });
          });
          drawAlignedPtProfile();
        }

        function ptPreviewFromDom() {
          const base = typeof previewPtInputFromDom === "function" ? previewPtInputFromDom() : appState()?.result?.input || {};
          const D = Math.max(1, number(id("depth")?.value, base.D || 220));
          return {
            ...base,
            D,
            ptEnabled: Boolean(id("ptEnabled")?.checked),
            memberType: id("memberType")?.value || base.memberType || "twoWay",
            panelX: Math.max(0.5, number(id("panelX")?.value, base.panelX || 8)),
            ptHighPoints: (appState()?.ptProfile?.highPoints || base.ptHighPoints || [25, 25]).map((value) => clampLocal(value, 0, D)),
            ptLowPoints: (appState()?.ptProfile?.lowPoints || base.ptLowPoints || [D / 2]).map((value) => clampLocal(value, 0, D)),
          };
        }

        function drawAlignedPtProfile() {
          const canvas = id("ptProfileCanvas");
          if (!canvas?.getContext) return;
          canvas.width = 1400;
          canvas.height = 660;
          const input = ptPreviewFromDom();
          const ctx = canvas.getContext("2d");
          wipe(ctx, canvas);
          ctx.fillStyle = "#17211d";
          ctx.font = "28px system-ui";
          ctx.fillText("Editable PT tendon profile", 34, 42);
          ctx.fillStyle = input.ptEnabled ? "#a16207" : "#60706a";
          ctx.font = "17px system-ui";
          ctx.fillText(input.ptEnabled ? "Depth grid is locked to the Member panel Depth D input." : "Post-tensioning is off; profile depth is still shown from the member input.", 34, 68);

          const layout = ptAlignedLayout(canvas, input);
          drawPtDepthGrid(ctx, layout, input);
          drawPtAlignedCurve(ctx, layout, input);
          drawPtControlLabels(ctx, layout, input);
          drawPtDepthDimension(ctx, layout, input);
          drawPtLegend(ctx, layout.left, canvas.height - 42);
        }

        function ptAlignedLayout(canvas, input) {
          const left = 108;
          const right = canvas.width - 118;
          const top = 118;
          const maxDepthPx = canvas.height - 250;
          const minDepthPx = 250;
          const depthPx = clampLocal(input.D * 1.35, minDepthPx, maxDepthPx);
          const total = ptProfileSpans(input).reduce((sum, span) => sum + span.length, 0) || 1;
          return {
            left,
            right,
            top,
            depthPx,
            width: right - left,
            yScale: depthPx / Math.max(input.D, 1),
            xScale: (right - left) / total,
            total,
          };
        }

        function ptProfileSpans(input) {
          if ((input.memberType || "twoWay") === "twoWay") {
            const spans = appState()?.twoWaySpansX?.length ? appState().twoWaySpansX : [input.panelX || 1];
            return spans.map((length) => ({ length: Math.max(0.5, Number(length) || 0.5) }));
          }
          const spans = appState()?.spans || input.spans || [{ length: 1 }];
          return spans.map((span) => ({ length: Math.max(0.5, Number(span.length ?? span) || 0.5) }));
        }

        function drawPtDepthGrid(ctx, layout, input) {
          ctx.save();
          ctx.fillStyle = "rgba(96,112,106,.06)";
          ctx.strokeStyle = "rgba(96,112,106,.34)";
          ctx.lineWidth = 2;
          ctx.fillRect(layout.left, layout.top, layout.width, layout.depthPx);
          ctx.strokeRect(layout.left, layout.top, layout.width, layout.depthPx);
          [
            [0, "0 mm top"],
            [input.D / 2, `mid-depth ${Math.round(input.D / 2)} mm`],
            [input.D, `full depth D = ${Math.round(input.D)} mm`],
          ].forEach(([depth, label]) => {
            const y = layout.top + depth * layout.yScale;
            ctx.strokeStyle = depth === input.D / 2 ? "rgba(10,132,255,.45)" : "rgba(96,112,106,.3)";
            ctx.lineWidth = depth === input.D ? 2.5 : 1.5;
            ctx.beginPath();
            ctx.moveTo(layout.left, y);
            ctx.lineTo(layout.right, y);
            ctx.stroke();
            drawLabel(ctx, label, layout.left - 14, y + 4, depth === input.D ? "#17211d" : "#60706a", "right");
          });
          const limits = tendonDepthLimitsFromDom(input);
          ctx.setLineDash([8, 6]);
          ctx.strokeStyle = "#bd5b32";
          [limits.min, limits.max].forEach((depth) => {
            const y = layout.top + depth * layout.yScale;
            ctx.beginPath();
            ctx.moveTo(layout.left, y);
            ctx.lineTo(layout.right, y);
            ctx.stroke();
          });
          ctx.setLineDash([]);
          ctx.fillStyle = "#bd5b32";
          ctx.font = "16px system-ui";
          ctx.fillText(`duct centreline zone: ${limits.min.toFixed(0)}-${limits.max.toFixed(0)} mm from top, based on cover inputs`, layout.left, layout.top + layout.depthPx + 32);
          ctx.restore();
        }

        function tendonDepthLimitsFromDom(input) {
          if (typeof ptProfileLimits === "function") {
            try {
              const limits = ptProfileLimits(input);
              if (Number.isFinite(limits.min) && Number.isFinite(limits.max)) return { min: clampLocal(limits.min, 0, input.D), max: clampLocal(limits.max, 0, input.D) };
            } catch {}
          }
          const topCover = Math.max(0, number(id("ptTopCover")?.value, 25));
          const bottomCover = Math.max(0, number(id("ptBottomCover")?.value, 25));
          const duct = Math.max(0, number(id("ptDuctDiameter")?.value, 13));
          const min = topCover + duct / 2;
          return { min: clampLocal(min, 0, input.D), max: clampLocal(input.D - bottomCover - duct / 2, min, input.D) };
        }

        function drawPtAlignedCurve(ctx, layout, input) {
          const spans = ptProfileSpans(input);
          const highs = input.ptHighPoints?.length ? input.ptHighPoints : [input.D / 2, input.D / 2];
          const lows = input.ptLowPoints?.length ? input.ptLowPoints : [input.D / 2];
          let acc = 0;
          ctx.save();
          ctx.strokeStyle = "#a16207";
          ctx.lineWidth = 4;
          spans.forEach((span, i) => {
            const x1 = layout.left + acc * layout.xScale;
            const x2 = layout.left + (acc + span.length) * layout.xScale;
            const h1 = clampLocal(highs[i] ?? highs[0] ?? input.D / 2, 0, input.D);
            const h2 = clampLocal(highs[i + 1] ?? highs[highs.length - 1] ?? h1, 0, input.D);
            const low = clampLocal(lows[i] ?? lows[0] ?? input.D / 2, 0, input.D);
            ctx.beginPath();
            for (let step = 0; step <= 48; step++) {
              const r = step / 48;
              const yFromTop = typeof tendonProfilePoint === "function" ? tendonProfilePoint(input, r, h1, h2, low) : h1 + (h2 - h1) * r + 4 * (low - (h1 + h2) / 2) * r * (1 - r);
              const x = x1 + (x2 - x1) * r;
              const y = layout.top + clampLocal(yFromTop, 0, input.D) * layout.yScale;
              if (step === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();
            drawLabel(ctx, `span ${i + 1} ${span.length.toFixed(2)} m`, (x1 + x2) / 2, layout.top + layout.depthPx + 62, "#60706a", "center");
            acc += span.length;
          });
          ctx.restore();
        }

        function drawPtControlLabels(ctx, layout, input) {
          const spans = ptProfileSpans(input);
          const highs = input.ptHighPoints || [];
          const lows = input.ptLowPoints || [];
          let acc = 0;
          drawPoint(ctx, layout.left, layout.top + clampLocal(highs[0] ?? input.D / 2, 0, input.D) * layout.yScale, `H1 ${(highs[0] ?? input.D / 2).toFixed(0)}`, "#0a84ff");
          spans.forEach((span, i) => {
            const mid = acc + span.length / 2;
            const end = acc + span.length;
            const low = clampLocal(lows[i] ?? lows[0] ?? input.D / 2, 0, input.D);
            const high = clampLocal(highs[i + 1] ?? highs[highs.length - 1] ?? input.D / 2, 0, input.D);
            drawPoint(ctx, layout.left + mid * layout.xScale, layout.top + low * layout.yScale, `L${i + 1} ${low.toFixed(0)}`, "#bd5b32");
            drawPoint(ctx, layout.left + end * layout.xScale, layout.top + high * layout.yScale, `H${i + 2} ${high.toFixed(0)}`, "#0a84ff");
            acc = end;
          });
        }

        function drawPoint(ctx, x, y, label, color) {
          ctx.save();
          ctx.fillStyle = color;
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(x, y, 7, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          drawLabel(ctx, label, x + 10, y - 10, color, "left");
          ctx.restore();
        }

        function drawPtDepthDimension(ctx, layout, input) {
          const x = layout.right + 42;
          const y1 = layout.top;
          const y2 = layout.top + layout.depthPx;
          ctx.save();
          ctx.strokeStyle = "#17211d";
          ctx.fillStyle = "#17211d";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x, y1);
          ctx.lineTo(x, y2);
          ctx.stroke();
          [["top", y1, -1], ["bottom", y2, 1]].forEach(([, y, dir]) => {
            ctx.beginPath();
            ctx.moveTo(x - 7, y + dir * 10);
            ctx.lineTo(x, y);
            ctx.lineTo(x + 7, y + dir * 10);
            ctx.stroke();
          });
          ctx.font = "18px system-ui";
          ctx.translate(x + 28, (y1 + y2) / 2);
          ctx.rotate(-Math.PI / 2);
          ctx.textAlign = "center";
          ctx.fillText(`Member Depth D = ${Math.round(input.D)} mm`, 0, 0);
          ctx.restore();
        }

        function drawPtLegend(ctx, x, y) {
          const items = [["#0a84ff", "high point"], ["#bd5b32", "low point"], ["#a16207", "tendon centreline"], ["#60706a", "member depth grid"]];
          ctx.save();
          ctx.font = "16px system-ui";
          items.forEach(([color, text], i) => {
            const px = x + i * 210;
            ctx.fillStyle = color;
            ctx.fillRect(px, y - 12, 22, 4);
            ctx.fillStyle = "#17211d";
            ctx.fillText(text, px + 32, y - 4);
          });
          ctx.restore();
        }

        function patchTwoWayModel() {
          if (typeof drawModel !== "function" || drawModel.twoWayStripColumnsFix) return;
          const baseDrawModel = drawModel;
          drawModel = function () {
            const st = appState();
            if (st?.result?.mode === "twoWay") {
              drawTwoWayStripModel(st.result.input);
              return;
            }
            return baseDrawModel.apply(this, arguments);
          };
          drawModel.twoWayStripColumnsFix = true;
        }

        function drawTwoWayStripModel(input) {
          const canvas = id("modelCanvas");
          if (!canvas?.getContext || !input) return;
          canvas.width = 1400;
          canvas.height = 790;
          const ctx = canvas.getContext("2d");
          wipe(ctx, canvas);
          ctx.fillStyle = "#17211d";
          ctx.font = "28px system-ui";
          ctx.fillText("Two-way slab X-direction equivalent strip model", 34, 42);
          ctx.fillStyle = "#60706a";
          ctx.font = "18px system-ui";
          ctx.fillText("Width b follows Design strip width. X flexure uses the two-way load share for the X strip.", 34, 66);
          const plan = { x: 72, y: 112, w: 560, h: 300 };
          drawPlan(ctx, plan, input);
          drawStrip(ctx, { x: 92, y: 650, w: 1180 }, input);
          drawInfoBox(ctx, 748, 112, 560, 250, input);
        }

        function twoWaySpans(input) {
          const st = appState();
          const raw = Array.isArray(input.twoWaySpansX) && input.twoWaySpansX.length ? input.twoWaySpansX : Array.isArray(st?.twoWaySpansX) && st.twoWaySpansX.length ? st.twoWaySpansX : [input.panelX || 1];
          return raw.map((span) => Math.max(0.5, Number(span) || 0.5));
        }

        function supportPositions(rect, spans) {
          const total = sumSpans(spans) || 1;
          const xs = [rect.x];
          let x = rect.x;
          spans.forEach((span) => {
            x += (span / total) * rect.w;
            xs.push(x);
          });
          return xs;
        }

        function drawPlan(ctx, rect, input) {
          const spans = twoWaySpans(input);
          const colStrip = clampLocal((input.columnStripPercent || 50) / 100, 0.2, 0.85) * rect.h;
          ctx.fillStyle = "#f7fbff";
          ctx.strokeStyle = "#17211d";
          ctx.lineWidth = 2.5;
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
          ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
          ctx.fillStyle = "rgba(10,132,255,.14)";
          ctx.fillRect(rect.x, rect.y + rect.h / 2 - colStrip / 2, rect.w, colStrip);
          ctx.fillStyle = "rgba(255,138,31,.12)";
          ctx.fillRect(rect.x, rect.y, rect.w, rect.h / 2 - colStrip / 2);
          ctx.fillRect(rect.x, rect.y + rect.h / 2 + colStrip / 2, rect.w, rect.h / 2 - colStrip / 2);
          supportPositions(rect, spans).forEach((x, i) => drawColumn(ctx, x, rect.y + rect.h / 2, input, `C${i + 1}`));
          let start = rect.x;
          spans.forEach((span, i) => {
            const end = rect.x + (sumSpans(spans.slice(0, i + 1)) / sumSpans(spans)) * rect.w;
            drawLabel(ctx, `L${i + 1} ${span.toFixed(2)} m`, (start + end) / 2, rect.y + rect.h + 28, "#17211d", "center");
            start = end;
          });
          drawLabel(ctx, `Plan ${input.panelX.toFixed(2)} m x ${input.panelY.toFixed(2)} m`, rect.x + rect.w / 2, rect.y - 18, "#17211d", "center");
          drawLabel(ctx, "column strip", rect.x + 16, rect.y + rect.h / 2 - colStrip / 2 + 28, "#126b63", "left");
        }

        function drawStrip(ctx, rect, input) {
          const spans = twoWaySpans(input);
          const y = rect.y;
          ctx.strokeStyle = "#17211d";
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.moveTo(rect.x, y);
          ctx.lineTo(rect.x + rect.w, y);
          ctx.stroke();
          supportPositions(rect, spans).forEach((x, i) => {
            drawColumn(ctx, x, y + 45, input, `C${i + 1}`);
            drawLoadArrow(ctx, x, y - 92, "#bd5b32");
          });
          let start = rect.x;
          spans.forEach((span, i) => {
            const end = rect.x + (sumSpans(spans.slice(0, i + 1)) / sumSpans(spans)) * rect.w;
            drawLabel(ctx, `L${i + 1} ${span.toFixed(2)} m`, (start + end) / 2, y + 124, "#17211d", "center");
            start = end;
          });
          drawLabel(ctx, "end columns are shown for single span; all support columns shown for multi-span", rect.x + rect.w, y + 166, "#60706a", "right");
        }

        function drawColumn(ctx, x, y, input, text) {
          const w = Math.max(28, Math.min(76, Number(input.columnX || 450) / 10));
          const h = Math.max(28, Math.min(76, Number(input.columnY || 450) / 10));
          ctx.fillStyle = "rgba(96,112,106,.24)";
          ctx.strokeStyle = "#60706a";
          ctx.lineWidth = 2;
          ctx.fillRect(x - w / 2, y - h / 2, w, h);
          ctx.strokeRect(x - w / 2, y - h / 2, w, h);
          drawLabel(ctx, `${text} column`, x, y + h / 2 + 24, "#60706a", "center");
        }

        function drawLoadArrow(ctx, x, y, color) {
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x, y + 56);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x - 6, y + 44);
          ctx.lineTo(x, y + 58);
          ctx.lineTo(x + 6, y + 44);
          ctx.stroke();
        }

        function drawInfoBox(ctx, x, y, w, h, input) {
          const share = twoWayXLoadShare(input.panelX, input.panelY);
          ctx.fillStyle = "#fff";
          ctx.strokeStyle = "rgba(23,33,29,.14)";
          ctx.lineWidth = 1.5;
          rounded(ctx, x, y, w, h, 8);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#17211d";
          ctx.font = "22px system-ui";
          ctx.fillText("Two-way Analysis Basis", x + 18, y + 34);
          ctx.font = "17px system-ui";
          [
            `Design strip width: ${input.panelY.toFixed(2)} m, Width b: ${(input.b / 1000).toFixed(2)} m`,
            `X design length: ${input.panelX.toFixed(2)} m`,
            `X load share: ${(share * 100).toFixed(0)}% by span-aspect stiffness split`,
            `Flexure rows are X column/middle strips per metre`,
          ].forEach((line, i) => ctx.fillText(line, x + 18, y + 76 + i * 34));
        }

        function wipe(ctx, canvas) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function rounded(ctx, x, y, w, h, r) {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.lineTo(x + w - r, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + r);
          ctx.lineTo(x + w, y + h - r);
          ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
          ctx.lineTo(x + r, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - r);
          ctx.lineTo(x, y + r);
          ctx.quadraticCurveTo(x, y, x + r, y);
          ctx.closePath();
        }

        function drawLabel(ctx, text, x, y, color, align) {
          ctx.save();
          ctx.font = "18px system-ui";
          const width = ctx.measureText(String(text)).width + 12;
          const height = 30;
          const left = align === "center" ? x - width / 2 : align === "right" ? x - width : x;
          ctx.fillStyle = "rgba(255,255,255,.94)";
          ctx.strokeStyle = "rgba(23,33,29,.12)";
          rounded(ctx, left, y - height + 6, width, height, 5);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = color || "#17211d";
          ctx.fillText(String(text), left + 6, y - 4);
          ctx.restore();
        }
      }
    </script>
  </body>
</html>
