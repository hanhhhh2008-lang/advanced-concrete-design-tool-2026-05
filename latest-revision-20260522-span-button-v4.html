<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Concrete Design Tool - 20260522 v4</title>
  <style>
    html,body,iframe{width:100%;height:100%;margin:0;border:0;background:#f4f7f5;font-family:system-ui,Segoe UI,Arial,sans-serif}
    #status{position:fixed;right:14px;bottom:14px;z-index:20;padding:8px 12px;border-radius:8px;background:rgba(18,107,99,.94);color:#fff;font-size:13px;box-shadow:0 10px 28px rgba(23,33,29,.18)}
  </style>
</head>
<body>
  <iframe id="app" src="latest-revision-20260521-no-model-jump.html?rev=20260522-span-button-v4"></iframe>
  <div id="status">Loading latest revision...</div>
  <script>
    const frame=document.getElementById('app');
    const status=document.getElementById('status');
    frame.addEventListener('load',()=>waitForApp());
    function waitForApp(attempt=0){
      const doc=frame.contentDocument;
      if(!doc||!doc.getElementById('addPanelXSpanBtn')){ if(attempt<100) setTimeout(()=>waitForApp(attempt+1),150); return; }
      const script=doc.createElement('script');
      script.textContent='('+patchApp.toString()+')();';
      doc.body.appendChild(script);
      status.textContent='Latest revision active';
      setTimeout(()=>status.hidden=true,2200);
    }

    function patchApp(){
      const q=(id)=>document.getElementById(id);
      const n=(v,f)=>{const x=Number(v);return Number.isFinite(x)?x:f;};
      const sum=(a)=>(a||[]).reduce((s,v)=>s+Math.max(.5,Number(v)||.5),0);
      hideRemovedTwoWayInputs();
      patchSingleSpanAdd();
      patchReadInputsForXSpans();
      patchMultiSpanPlateDeflection();
      patchDeflectionPanelOnly();
      try{ if(typeof safeRun==='function') safeRun(); }catch{}
      window.__spanButtonV4Ready=true;

      function hideRemovedTwoWayInputs(){
        ['columnsBelowLayout','columnsBelowSpacingX','columnsBelowSpacingY'].forEach((id)=>{
          const el=q(id); if(!el) return;
          const label=el.closest('label'); if(label) label.style.display='none';
          if(id==='columnsBelowLayout') el.value='grid';
          if(id==='columnsBelowSpacingX'||id==='columnsBelowSpacingY') el.value=el.value||'1.5';
        });
      }

      function patchSingleSpanAdd(){
        bind(q('addPanelXSpanBtn'),'x');
        bind(q('addPanelYSpanBtn'),'y');
      }
      function bind(button,axis){
        if(!button||button.dataset.singleSpanAdd==='1') return;
        button.dataset.singleSpanAdd='1';
        button.addEventListener('click',(event)=>{
          event.preventDefault();
          event.stopImmediatePropagation();
          const key=axis==='y'?'twoWaySpansY':'twoWaySpansX';
          const inputId=axis==='y'?'panelY':'panelX';
          const fallback=axis==='y'?7:8;
          try{
            state[key]=Array.isArray(state[key])&&state[key].length?state[key]:[Math.max(.5,n(q(inputId)?.value,fallback))];
            state[key].push(Math.max(.5,Number(state[key].at(-1))||fallback));
            if(q(inputId)) q(inputId).value=sum(state[key]).toFixed(1);
            if(typeof renderTwoWaySpans==='function') renderTwoWaySpans();
            if(typeof renderPtProfile==='function') renderPtProfile();
            if(typeof safeRun==='function') safeRun();
          }catch{}
        },true);
      }

      function patchReadInputsForXSpans(){
        if(typeof readInputs!=='function'||readInputs.spanButtonV4) return;
        const base=readInputs;
        readInputs=function(){
          const data=base.apply(this,arguments);
          try{
            if(data?.memberType==='twoWay'){
              data.twoWaySpansX=xSpans(data);
              data.twoWaySpansY=[Math.max(.5,n(q('panelY')?.value,data.panelY||7))];
              data.panelX=sum(data.twoWaySpansX);
              data.panelY=data.twoWaySpansY[0];
            }
          }catch{}
          return data;
        };
        readInputs.spanButtonV4=true;
      }

      function xSpans(input={}){
        let raw=[];
        try{ raw=Array.isArray(input.twoWaySpansX)&&input.twoWaySpansX.length?input.twoWaySpansX:Array.isArray(state.twoWaySpansX)&&state.twoWaySpansX.length?state.twoWaySpansX:[input.panelX||1]; }
        catch{ raw=[input.panelX||1]; }
        const spans=raw.map((span)=>Math.max(.5,Number(span)||.5));
        const total=sum(spans);
        const target=Math.max(.5,Number(input.panelX)||total||1);
        if(Math.abs(total-target)>.05){ const scale=target/Math.max(total,.5); return spans.map((span)=>Math.max(.5,span*scale)); }
        return spans;
      }

      function patchMultiSpanPlateDeflection(){
        if(typeof plateGridDeflection!=='function'||plateGridDeflection.spanButtonV4) return;
        const base=plateGridDeflection;
        plateGridDeflection=function(input,qLoad,options={}){
          const spans=xSpans(input);
          if(input?.memberType!=='twoWay'||input.__singleSpanPlate||spans.length<=1){
            const plate=base(input,qLoad,options); if(input?.memberType==='twoWay') plate.xSpanLengths=spans; return plate;
          }
          const points=[]; const xProfile=[]; let offset=0; let maxDeflectionM=0; let maxAt={x:spans[0]/2,y:Math.max(Number(input.panelY||1),1)/2}; let governing=null;
          spans.forEach((span,spanIndex)=>{
            const plate=base({...input,panelX:span,twoWaySpansX:[span],__singleSpanPlate:true},qLoad,options);
            (plate.points||[]).forEach((p)=>points.push({...p,x:p.x+offset,localX:p.x,spanIndex}));
            (plate.xProfile||[]).forEach((p,i)=>{ if(spanIndex>0&&i===0) return; xProfile.push({...p,x:p.x+offset,localX:p.x,spanIndex,spanLength:span}); });
            if(Math.abs(plate.maxDeflectionM||0)>Math.abs(maxDeflectionM)){ maxDeflectionM=Math.abs(plate.maxDeflectionM||0); maxAt={x:offset+(plate.maxAt?.x||span/2),y:plate.maxAt?.y||input.panelY/2}; governing=plate; }
            offset+=span;
          });
          return {grid:governing?.grid||input.plateGrid||18,stiffnessModifier:governing?.stiffnessModifier||1,restraintModifier:governing?.restraintModifier||1,points,maxDeflectionM,maxAt,xProfile,yProfile:governing?.yProfile||[],xSpanLengths:spans};
        };
        plateGridDeflection.spanButtonV4=true;
      }

      function patchDeflectionPanelOnly(){
        if(typeof drawTwoWayLimitDiagrams==='function'){
          drawTwoWayLimitDiagrams=function(){
            let result; try{result=state.result;}catch{return;}
            if(result?.mode!=='twoWay') return;
            const canvas=q('limitCanvas'); if(!canvas?.getContext) return;
            canvas.width=1400; canvas.height=760;
            const ctx=canvas.getContext('2d'); wipe(ctx,canvas);
            title(ctx,'Deflection Review','Long-term deflection is drawn span by span. Punching shear is shown only in Moments / Shear.',42,48);
            const samples=deflectionSamples(result.input,result.twoWay);
            summary(ctx,42,86,samples,result.input);
            drawDeflection(ctx,samples,result.input,92,410,250,canvas.width);
          };
        }
      }

      function deflectionSamples(input,twoWay){
        const shortProfile=twoWay?.shortPlate?.xProfile||[];
        const longProfile=twoWay?.longPlate?.xProfile||shortProfile;
        const spans=xSpans(input); const total=sum(spans)||Math.max(Number(input.panelX)||1,1);
        const profileTotal=Math.max(shortProfile.at(-1)?.x||0,longProfile.at(-1)?.x||0,Number(input.panelX)||total,1);
        return shortProfile.map((point,i)=>{ const x=(Number(point.x||0)/profileTotal)*total; const shortMm=Math.abs(Number(point.defl||0)*1000); const longMm=Math.abs(Number(longProfile[i]?.defl??point.defl??0)*1000); return {x,shortMm,longMm,incrementalMm:Math.max(0,longMm-shortMm),limitMm:limitAt(input,spans,x)}; });
      }
      function limitAt(input,spans,x){ const ratio=Math.max(Number(input.deflectionRatio||250),1); let start=0; for(const span of spans){ if(x<=start+span+1e-9) return span*1000/ratio; start+=span; } return ((spans.at(-1)||input.panelX||1)*1000)/ratio; }

      function drawDeflection(ctx,samples,input,pad,axisY,height,width){
        if(!samples.length) return;
        const total=samples.at(-1).x||1; const max=Math.max(1,...samples.map((s)=>Math.max(s.longMm,s.limitMm))); const xScale=(width-2*pad)/total; const yScale=height/max; const bottom=axisY+height;
        line(ctx,pad,axisY,width-pad,axisY,'#cfd8d1',1.5); markers(ctx,input,pad,axisY,height,xScale);
        poly(ctx,samples,(s)=>pad+s.x*xScale,(s)=>axisY+s.limitMm*yScale,'#a16207',[8,6]);
        poly(ctx,samples,(s)=>pad+s.x*xScale,(s)=>axisY+s.longMm*yScale,'#bd5b32');
        const gp=samples.reduce((best,s)=>s.longMm>best.longMm?s:best,samples[0]);
        label(ctx,`long-term ${gp.longMm.toFixed(2)} mm`,Math.min(width-pad-170,pad+gp.x*xScale+12),axisY+gp.longMm*yScale-10,'#bd5b32',14);
        label(ctx,`incremental max ${Math.max(...samples.map((s)=>s.incrementalMm)).toFixed(2)} mm`,pad,bottom+76,'#bd5b32',15);
        label(ctx,'long-term',pad+250,bottom+106,'#bd5b32',13); label(ctx,'allowable',pad+380,bottom+106,'#a16207',13);
      }
      function markers(ctx,input,pad,axisY,height,xScale){ const spans=xSpans(input); let x=0; spans.slice(0,-1).forEach((span)=>{x+=span; line(ctx,pad+x*xScale,axisY-8,pad+x*xScale,axisY+height+8,'rgba(96,112,106,.32)',1);}); x=0; spans.forEach((span,i)=>{ if(i===0) support(ctx,pad,axisY+height+12,'C1'); x+=span; support(ctx,pad+x*xScale,axisY+height+12,`C${i+2}`); label(ctx,`span ${i+1}: ${span.toFixed(1)} m`,pad+(x-span/2)*xScale-38,axisY+height+50,'#60706a',11); }); }
      function summary(ctx,x,y,samples,input){ const longMax=Math.max(0,...samples.map((s)=>s.longMm)); const incMax=Math.max(0,...samples.map((s)=>s.incrementalMm)); const limit=Math.min(...samples.map((s)=>s.limitMm)); card(ctx,x,y,1290,86); [[`Long-term`,`${longMax.toFixed(2)} mm`],[`Incremental`,`${incMax.toFixed(2)} mm`],[`Allowable`,`L/${input.deflectionRatio} = ${limit.toFixed(1)} mm`],[`Status`,longMax<=limit?'OK':'Review']].forEach(([a,b],i)=>{ label(ctx,a,x+16+i*320,y+30,'#60706a',13); label(ctx,b,x+16+i*320,y+60,'#17211d',20); }); }
      function wipe(ctx,canvas){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);}
      function title(ctx,h,s,x,y){label(ctx,h,x,y,'#17211d',26);label(ctx,s,x,y+28,'#60706a',15);}
      function card(ctx,x,y,w,h){ctx.fillStyle='#fff';ctx.strokeStyle='rgba(23,33,29,.14)';ctx.beginPath(); if(ctx.roundRect)ctx.roundRect(x,y,w,h,8); else ctx.rect(x,y,w,h); ctx.fill();ctx.stroke();}
      function label(ctx,t,x,y,c,size){ctx.fillStyle=c;ctx.font=`${size}px system-ui`;ctx.fillText(String(t),x,y);}
      function line(ctx,x1,y1,x2,y2,c,w){ctx.strokeStyle=c;ctx.lineWidth=w||1;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
      function poly(ctx,samples,xf,yf,c,dash){ctx.save();ctx.strokeStyle=c;ctx.lineWidth=3;ctx.setLineDash(dash||[]);ctx.beginPath();samples.forEach((s,i)=>{const x=xf(s),y=yf(s); if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);});ctx.stroke();ctx.restore();}
      function support(ctx,x,y,t){line(ctx,x,y-12,x,y+10,'#60706a',1.5);line(ctx,x-8,y+10,x+8,y+10,'#60706a',1.5);label(ctx,t,x-8,y+25,'#60706a',10);}
    }
  </script>
</body>
</html>
