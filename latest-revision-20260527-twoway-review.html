<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Concrete Design Tool - Two-way Review Fix</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f4f7f5;color:#17211d;font-family:system-ui,Segoe UI,Arial,sans-serif}.loading{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.loading b{color:#126b63}
  </style>
</head>
<body>
  <div class="loading"><div><b>Loading two-way review fix...</b><br />Opening the latest concrete design tool revision.</div></div>
  <script>
    (async function(){
      const key='20260527-twoway-review-v1';
      const res=await fetch('index.html?fresh='+key,{cache:'no-store'});
      if(!res.ok) throw new Error('Could not load index.html: '+res.status);
      const parsed=new DOMParser().parseFromString(await res.text(),'text/html');
      const scripts=[...parsed.scripts];
      scripts.forEach(s=>s.remove());
      document.head.innerHTML=parsed.head.innerHTML;
      document.body.innerHTML=parsed.body.innerHTML;
      [...document.querySelectorAll('link[rel="stylesheet"]')].forEach(l=>{l.href=bust(l.getAttribute('href')||'',key)});
      for(const old of scripts) await loadScript(old,key);
      await loadOptional('analysis-manual-fixes.js',key);
      applyTwoWayPatch();
      try{ if(typeof safeRun==='function') safeRun(); }catch{}
      window.__twoWayReviewPublicFix=key;
    })().catch(e=>{document.body.innerHTML='<div class="loading"><div><b>Could not load latest revision.</b><br>'+String(e)+'</div></div>'});

    function bust(url,key){return url?url+(url.includes('?')?'&':'?')+'v='+encodeURIComponent(key)+'&t='+Date.now():url}
    function loadScript(old,key){return new Promise((resolve,reject)=>{const s=document.createElement('script');const src=old.getAttribute('src')||old.src;if(src){s.src=bust(src,key);s.onload=resolve;s.onerror=reject}else{s.textContent=old.textContent;setTimeout(resolve,0)}document.body.appendChild(s);if(!src)resolve();})}
    function loadOptional(src,key){return new Promise(resolve=>{const s=document.createElement('script');s.src=bust(src,key);s.onload=resolve;s.onerror=resolve;document.body.appendChild(s);})}

    function applyTwoWayPatch(){
      const q=id=>document.getElementById(id); const n=(v,f=0)=>Number.isFinite(Number(v))?Number(v):f; const c=(v,a,b)=>Math.max(a,Math.min(b,Number(v)||0)); const lerp=(a,b,t)=>a+(b-a)*c(t,0,1);
      if(typeof designTwoWayStrips==='function') designTwoWayStrips=function(input,wu,plate){
        const lx=n(input.panelX,1), ly=n(input.panelY,1), fix=typeof connectionFixityRatio==='function'?connectionFixityRatio(input):c(n(input.columnFixity,50)/100,0,1);
        const share=typeof twoWayXLoadShare==='function'?twoWayXLoadShare(lx,ly):0.5; const mo=Math.max(0,wu)*share*ly*lx*lx/8;
        const neg=lerp(.55,.70,fix), pos=1-neg, colPct=c(n(input.columnStripPercent,50)/100,.2,.8), colW=Math.max(ly*colPct,.1), midW=Math.max(ly-colW,ly*.1);
        const colNeg=lerp(.65,.75,fix), colPos=lerp(.55,.65,fix); const def=typeof twoWayGoverningDeflectionCheck==='function'?twoWayGoverningDeflectionCheck(input,plate):{deflectionMm:0,limitMm:1,ok:true};
        const data=[['column strip','negative',colW,mo*neg*colNeg],['column strip','positive',colW,mo*pos*colPos],['middle strip','positive',midW,mo*pos*(1-colPos)],['middle strip','negative',midW,mo*neg*(1-colNeg)]];
        return data.map(item=>{const Mu=Math.abs(item[3]/Math.max(item[2],.1)); const strip={...input,memberType:'slab',b:1000,d:input.d}; const face=item[1]==='negative'?'top':'bottom'; const phi=typeof flexurePhi==='function'?flexurePhi(strip):.8; const asReq=typeof requiredSteel==='function'?requiredSteel(strip,Mu/Math.max(phi,1e-9),face):0; const provided=typeof chooseReo==='function'?chooseReo({...strip,memberType:'slab'},asReq,face):{as:0,text:'-'}; const phiMu=typeof momentCapacity==='function'?phi*momentCapacity(strip,provided.as,face):0; return {zone:'X '+item[0],location:item[1],face,Mu,phiMu,asReq,provided,util:phiMu>0?Mu/phiMu:Infinity,deflection:def.deflectionMm,limit:def.limitMm,deflectionOk:def.ok,check:'X equivalent strip: moment split before strip distribution'};});
      };
      if(typeof evaluateTwoWayStatus==='function') evaluateTwoWayStatus=function(twoWay){const sf=(twoWay.strips||[]).filter(r=>r.util>1.02).map(r=>`${r.zone} ${r.location}: flexure ${(r.util*100).toFixed(0)}%`); const df=(twoWay.strips||[]).filter(r=>!r.deflectionOk).slice(0,1).map(r=>`plate deflection ${r.deflection.toFixed(1)} mm > ${r.limit.toFixed(1)} mm`); const pf=(twoWay.supportShear||[]).filter(r=>/AS 3600/i.test(r.zone)&&r.util>1.05).map(r=>`${r.zone}: support shear ${(r.util*100).toFixed(0)}%`); const warn=(twoWay.supportShear||[]).filter(r=>r.util>1&&!/AS 3600/i.test(r.zone)).map(r=>`${r.zone}: comparison support shear ${(r.util*100).toFixed(0)}%; review separately.`); const failures=[...sf,...df,...pf]; return {ok:!failures.length,label:failures.length?'FAILS':'WORKS',headline:failures.length?'Two-way slab advanced design fails one or more checks.':'Two-way slab flexure, deflection and AS 3600 support-shear checks pass.',failures,warnings:[...warn,'AS 3600 engineering review still required for detailing, ductility, shear, torsion and project requirements.'],reviewItems:typeof verificationItems==='function'?verificationItems():[]};};
      patchBeamDefaults(); patchDrawings();
      function patchBeamDefaults(){const count=()=>{const b=n(q('width')?.value,300),cover=n(q('cover')?.value,40),dia=16;return Math.max(2,Math.min(30,Math.round(Math.max(0,b-2*(cover+dia/2))/200)+1))}; const apply=()=>{if(q('memberType')?.value!=='beam')return;const k=count();[['barDia',16],['layers',1],['topLayerBars','N16'],['bottomLayerBars','N16'],['topBarsPerM',k],['bottomBarsPerM',k],['shearLigDia',12],['shearLigLegs',2],['shearLigSpacing',300]].forEach(([id,v])=>{const el=q(id);if(el)el.value=v});try{state.rebarSchedule.top=[{dia:16,count:k}];state.rebarSchedule.bottom=[{dia:16,count:k}];renderReinforcementInput?.()}catch{}};q('memberType')?.addEventListener('change',()=>setTimeout(apply,0),true);apply();}
      function patchDrawings(){
        drawEnvelopeDiagrams=function(){const canvas=q('envelopeCanvas'); if(!canvas||!state?.result)return; canvas.width=1400; canvas.height=state.result.mode==='twoWay'?820:canvas.height; const ctx=canvas.getContext('2d'); wipe(ctx,canvas); if(state.result.mode!=='twoWay'){try{return drawEnvelopeBand(ctx,canvas,state.result.designEnvelope.samples,'momentMax','momentMin',70,190,250,'All ULS bending moment envelope','#126b63','#bd5b32')}catch{return}} const rows=state.result.combinationResults.map((x,i)=>({label:'C'+(i+1),name:x.combo.name,type:x.combo.type,d:Math.abs(x.analysis.maxMoment.value),cap:x.combo.type==='ULS'?Math.max(Math.abs(x.analysis.maxMoment.value),1):0,def:Math.abs(x.analysis.maxDefl.value)*1000,defcap:x.combo.type==='ULS'?0:Math.max(Math.abs(x.analysis.maxDefl.value)*1000,1)})); head(ctx,'Combination Envelope Review','Short labels avoid clashing; full names are listed in the key.',42,48); comboChart(ctx,rows.slice(0,8),70,325,190,800,'Two-way strength envelope by combination','kNm/m','d','cap'); comboChart(ctx,rows.slice(0,8),70,650,190,800,'Two-way deflection envelope by service combination','mm','def','defcap'); key(ctx,rows.slice(0,8),930,142,390); };
        drawTwoWayDiagrams=function(){if(state?.result?.mode!=='twoWay')return; const {input,twoWay}=state.result,canvas=q('diagramCanvas'),ctx=canvas.getContext('2d'); canvas.width=1400; canvas.height=900; wipe(ctx,canvas); head(ctx,'Moments / Shear Review','Flexure strip checks are separated from punching shear to keep labels readable.',42,54); stripChart(ctx,twoWay.strips||[],70,455,240,650,'X-direction column and middle strip flexure'); const r=as3600(twoWay.supportShear); punch(ctx,input,795,190,500,300,r); if(r) gauge(ctx,r,795,600,500,90,'AS 3600 punching shear demand / capacity'); if(r) punchPanel(r); };
        drawTwoWayLimitDiagrams=function(){if(state?.result?.mode!=='twoWay')return; const {input,twoWay}=state.result,canvas=q('limitCanvas'),ctx=canvas.getContext('2d'); canvas.width=1400; canvas.height=760; wipe(ctx,canvas); head(ctx,'Deflection Review','Only long-term deflection is plotted; incremental movement is shown below.',42,54); const samples=typeof twoWayDeflectionProfileSamples==='function'?twoWayDeflectionProfileSamples(input,twoWay):(twoWay.shortPlate.xProfile||[]).map(p=>({x:p.x,longMm:p.defl*1000,shortMm:p.defl*1000,incrementalMm:0,limitMm:input.panelX*1000/input.deflectionRatio})); defl(ctx,canvas,samples,92,415,245,'X-direction strip long-term deflection, drawn span by span'); };
      }
      function wipe(ctx,canvas){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.textAlign='left'} function txt(ctx,t,x,y,col='#17211d',s=14,a='left'){ctx.save();ctx.fillStyle=col;ctx.font=s+'px system-ui,Segoe UI,Arial';ctx.textAlign=a;ctx.fillText(String(t),x,y);ctx.restore()} function head(ctx,a,b,x,y){txt(ctx,a,x,y,'#17211d',26);txt(ctx,b,x,y+30,'#60706a',15)} function line(ctx,x1,y1,x2,y2,col,w=1){ctx.save();ctx.strokeStyle=col;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();ctx.restore()} function legend(ctx,items,x,y){let lx=x;items.forEach(([c,l])=>{ctx.fillStyle=c;ctx.fillRect(lx,y-11,28,6);txt(ctx,l,lx+38,y-3,'#17211d',13);lx+=Math.max(150,l.length*7+48)})}
      function comboChart(ctx,rows,x,axisY,h,w,title,unit,dk,ck){txt(ctx,title,x,axisY-h-30,'#17211d',18);const max=Math.max(1,...rows.map(r=>Math.max(Math.abs(r[dk]||0),Math.abs(r[ck]||0))));const gap=20,g=(w-gap*(rows.length-1))/rows.length;line(ctx,x,axisY,x+w,axisY,'#d7ddd8',1.5);rows.forEach((r,i)=>{const gx=x+i*(g+gap),dh=Math.abs(r[dk]||0)/max*h,ch=Math.abs(r[ck]||0)/max*h;ctx.fillStyle='#bd5b32';ctx.fillRect(gx+g*.16,axisY-dh,g*.24,dh);if(r[ck]>0){ctx.fillStyle='#126b63';ctx.fillRect(gx+g*.50,axisY-ch,g*.24,ch)}txt(ctx,r.label,gx+g*.45,axisY+24,'#60706a',14,'center')});legend(ctx,[['#bd5b32','demand '+unit],['#126b63','capacity '+unit]],x,axisY+58)}
      function key(ctx,rows,x,y,w){ctx.fillStyle='#fff';ctx.strokeStyle='rgba(23,33,29,.14)';round(ctx,x,y,w,300,8);ctx.fill();ctx.stroke();txt(ctx,'Combination key',x+18,y+32,'#17211d',17);rows.forEach((r,i)=>{txt(ctx,r.label,x+18,y+64+i*27,r.type==='ULS'?'#bd5b32':'#126b63',13);fit(ctx,r.name,x+58,y+64+i*27,w-76,'#60706a',12)})}
      function stripChart(ctx,rows,x,axisY,h,w,title){txt(ctx,title,x,axisY-h-34,'#17211d',18);const max=Math.max(1,...rows.map(r=>Math.max(Math.abs(r.Mu||0),Math.abs(r.phiMu||0))));const gap=24,g=(w-gap*(rows.length-1))/rows.length;line(ctx,x,axisY,x+w,axisY,'#d7ddd8',1.5);rows.forEach((r,i)=>{const gx=x+i*(g+gap),dh=Math.abs(r.Mu||0)/max*h,ch=Math.abs(r.phiMu||0)/max*h;ctx.fillStyle='#bd5b32';ctx.fillRect(gx+g*.16,axisY-dh,g*.24,dh);ctx.fillStyle='#126b63';ctx.fillRect(gx+g*.52,axisY-ch,g*.24,ch);txt(ctx,Math.abs(r.Mu||0).toFixed(1),gx+g*.28,axisY-dh-8,'#bd5b32',12,'center');txt(ctx,Math.abs(r.phiMu||0).toFixed(1),gx+g*.64,axisY-ch-8,'#126b63',12,'center');wrap(ctx,(r.zone||'').replace(/^X /,'').replace('column strip','column').replace('middle strip','middle')+' '+(r.location||''),gx+g/2,axisY+24,g+18)});legend(ctx,[['#bd5b32','demand kNm/m'],['#126b63','capacity kNm/m']],x,axisY+105)}
      function defl(ctx,canvas,samples,pad,axisY,h,title){samples=samples.map(s=>({...s,longMm:Math.abs(n(s.longMm,0)),shortMm:Math.abs(n(s.shortMm,0)),incrementalMm:Math.abs(n(s.incrementalMm,Math.abs(n(s.longMm,0))-Math.abs(n(s.shortMm,0)))),limitMm:Math.abs(n(s.limitMm,0))})); const total=Math.max(1e-9,samples.at(-1)?.x||1),max=Math.max(1,...samples.map(s=>Math.max(s.longMm,s.limitMm))),xs=(canvas.width-2*pad)/total,ys=h/max; txt(ctx,title,pad,axisY-34,'#17211d',18); line(ctx,pad,axisY,canvas.width-pad,axisY,'#d7ddd8',1.5); poly(ctx,samples,s=>pad+s.x*xs,s=>axisY+s.limitMm*ys,'#a16207',[8,6]); poly(ctx,samples,s=>pad+s.x*xs,s=>axisY+s.longMm*ys,'#bd5b32',[]); const lp=samples.reduce((b,s)=>s.longMm>b.longMm?s:b,samples[0]); pill(ctx,'long-term '+lp.longMm.toFixed(2)+' mm',Math.min(canvas.width-pad-190,pad+lp.x*xs+22),axisY+lp.longMm*ys+34,'#bd5b32'); const lim=Math.min(...samples.map(s=>s.limitMm||Infinity)); pill(ctx,'allowable '+lim.toFixed(1)+' mm',canvas.width-pad-190,axisY+Math.min(h-18,lim*ys)+8,'#a16207'); txt(ctx,'incremental '+Math.max(...samples.map(s=>s.incrementalMm)).toFixed(2)+' mm = long-term minus short-term',pad,axisY+h+78,'#bd5b32',15); legend(ctx,[['#bd5b32','long-term'],['#a16207','allowable']],pad,axisY+h+112)}
      function poly(ctx,arr,xf,yf,col,dash){ctx.save();ctx.strokeStyle=col;ctx.lineWidth=3;ctx.setLineDash(dash||[]);ctx.beginPath();arr.forEach((s,i)=>{const x=xf(s),y=yf(s);if(i)ctx.lineTo(x,y);else ctx.moveTo(x,y)});ctx.stroke();ctx.restore()} function punch(ctx,input,x,y,w,h,row){txt(ctx,'Punching shear plan',x,y-26,'#17211d',17);ctx.fillStyle='#f7fbff';ctx.strokeStyle='#d7ddd8';ctx.fillRect(x,y,320,h);ctx.strokeRect(x,y,320,h);const cx=x+160,cy=y+h/2,cw=Math.max(42,Math.min(100,n(input.columnX,450)/1000*160)),ch=Math.max(42,Math.min(100,n(input.columnY,450)/1000*160));ctx.fillStyle='rgba(96,112,106,.28)';ctx.strokeStyle='#60706a';ctx.fillRect(cx-cw/2,cy-ch/2,cw,ch);ctx.strokeRect(cx-cw/2,cy-ch/2,cw,ch);ctx.setLineDash([8,6]);ctx.strokeStyle='#bd5b32';ctx.lineWidth=3;ctx.strokeRect(cx-cw/2-42,cy-ch/2-42,cw+84,ch+84);ctx.setLineDash([]);txt(ctx,'column',cx,cy+5,'#17211d',12,'center');txt(ctx,`${n(input.columnX,0).toFixed(0)} x ${n(input.columnY,0).toFixed(0)} mm column`,x+346,y+32,'#17211d',14);txt(ctx,'critical shear perimeter',x+346,y+62,'#bd5b32',14);txt(ctx,`effective depth d = ${n(input.d,0).toFixed(0)} mm`,x+346,y+92,'#60706a',14);if(row){const col=row.util<=1?'#126b63':'#bd5b32';txt(ctx,`utilisation ${(row.util*100).toFixed(0)}%`,x+346,y+132,col,14)}} function gauge(ctx,row,x,y,w,h,title){txt(ctx,title,x,y-22,'#17211d',16);const d=Math.max(0,row.Mu||0),cap=Math.max(1,row.phiMu||1),u=d/cap;ctx.fillStyle='#eef4ef';round(ctx,x,y,w,h,10);ctx.fill();ctx.fillStyle=u<=1?'#126b63':'#bd5b32';round(ctx,x,y,Math.min(w,w*u),h,10);ctx.fill();txt(ctx,`${d.toFixed(1)} / ${cap.toFixed(1)} kN (${(u*100).toFixed(0)}%)`,x+w/2,y+h/2+6,'#17211d',16,'center')} function punchPanel(r){const p=q('punchingShearPanel');if(p)p.innerHTML=`<h3>AS 3600 Punching Shear</h3><div class="punching-shear-grid"><div><span>Demand Vu*</span><b>${r.Mu.toFixed(1)} kN</b></div><div><span>Capacity phiVu</span><b>${r.phiMu.toFixed(1)} kN</b></div><div><span>Utilisation</span><b>${(r.util*100).toFixed(0)}%</b></div></div><p class="model-info-note">Shown separately from flexure so the Moments / Shear diagram stays readable.</p>`} function as3600(rows){return(rows||[]).find(r=>/AS\s*3600/i.test(r.zone||r.code||''))||(rows||[])[0]||null}
      function fit(ctx,t,x,y,mw,col,s){let v=String(t);ctx.save();ctx.font=s+'px system-ui';while(v.length>8&&ctx.measureText(v).width>mw)v=v.slice(0,-4)+'...';ctx.fillStyle=col;ctx.fillText(v,x,y);ctx.restore()} function wrap(ctx,t,x,y,w){const words=String(t).split(' ');let cur='',yy=y;ctx.save();ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillStyle='#60706a';words.forEach(word=>{const next=cur?cur+' '+word:word;if(ctx.measureText(next).width>w&&cur){ctx.fillText(cur,x,yy);cur=word;yy+=15}else cur=next});if(cur)ctx.fillText(cur,x,yy);ctx.restore()} function pill(ctx,t,x,y,col){ctx.save();ctx.font='13px system-ui';const w=ctx.measureText(String(t)).width+18;ctx.fillStyle='rgba(255,255,255,.96)';ctx.strokeStyle=col;round(ctx,x,y-22,w,30,6);ctx.fill();ctx.stroke();txt(ctx,t,x+9,y-2,col,13);ctx.restore()} function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
    }
  </script>
</body>
</html>
