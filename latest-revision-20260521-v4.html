<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Concrete Design Tool - Latest Revision v4</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#f4f7f5;font-family:system-ui,Segoe UI,Arial,sans-serif;color:#17211d}
    #frame{width:100vw;height:100vh;border:0;display:block}
    #banner{position:fixed;left:12px;right:12px;top:10px;z-index:4;background:rgba(255,255,255,.95);border:1px solid rgba(23,33,29,.14);border-radius:8px;padding:8px 12px;font-size:13px;box-shadow:0 8px 24px rgba(23,33,29,.12)}
    #banner b{color:#126b63}
  </style>
</head>
<body>
  <div id="banner"><b>Latest revision v4 loaded.</b> 3D section cuts now move with keyboard arrows, load-combination Q factors are visible/editable, and the duplicate Flexure / Shear section preview is hidden.</div>
  <iframe id="frame" src="latest-revision-20260521.html?rev=v4-20260521-geometry-combo"></iframe>
  <script>
(function () {
  const frame = document.getElementById('frame');
  const banner = document.getElementById('banner');
  let tries = 0;
  frame.addEventListener('load', armPatch);
  armPatch();
  setTimeout(function(){ if (banner) banner.style.display = 'none'; }, 9000);

  function armPatch() {
    const timer = setInterval(function () {
      tries += 1;
      try {
        const hostDoc = frame.contentDocument;
        const review = hostDoc && hostDoc.getElementById('review');
        const reviewDoc = review && review.contentDocument;
        const appFrame = reviewDoc && reviewDoc.getElementById('app');
        const appDoc = appFrame && appFrame.contentDocument;
        if (!appDoc || !appDoc.getElementById('runAnalysisBtn')) {
          if (tries > 100) clearInterval(timer);
          return;
        }
        if (!appDoc.getElementById('latestRevisionV4Patch')) {
          const script = appDoc.createElement('script');
          script.id = 'latestRevisionV4Patch';
          script.textContent = '(' + latestRevisionV4Patch.toString() + ')();';
          appDoc.documentElement.appendChild(script);
        }
        clearInterval(timer);
      } catch (error) {
        if (tries > 100) clearInterval(timer);
      }
    }, 250);
  }

  function latestRevisionV4Patch() {
    if (window.__latestRevisionV4PatchStarted) return;
    window.__latestRevisionV4PatchStarted = true;
    const q = (id) => document.getElementById(id);
    const clamp = (value, lo, hi) => Math.max(lo, Math.min(hi, Number(value) || 0));
    const esc = (value) => String(value == null ? '' : value).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    let geometryTimer = null;
    let geometryArmed = false;

    injectV4Styles();
    patchGeometryKeyboard();
    patchCombinationCards();
    patchDesignDuplicate();
    setTimeout(function(){ try { if (typeof safeRun === 'function') safeRun(); } catch {} }, 80);

    function injectV4Styles() {
      if (q('latestRevisionV4Styles')) return;
      const style = document.createElement('style');
      style.id = 'latestRevisionV4Styles';
      style.textContent = `
        .geometry-keyboard-hint{margin-top:8px;padding:10px 12px;border:1px solid rgba(23,33,29,.12);border-radius:8px;background:#f7faf8;color:#33443d;font-size:13px;line-height:1.35}
        .combo-card-editor{display:grid;gap:10px}
        .combo-card{display:grid;gap:8px;padding:10px;border:1px solid rgba(23,33,29,.12);border-radius:8px;background:#fff}
        .combo-card-head,.combo-factor-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(72px,.6fr);gap:8px}
        .combo-factor-grid{grid-template-columns:repeat(4,minmax(0,1fr));align-items:end}
        .combo-card label{display:grid;gap:4px;min-width:0;font-size:12px;color:#60706a;overflow-wrap:anywhere}
        .combo-card input,.combo-card select{width:100%;min-width:0;box-sizing:border-box}
        .combo-card .combo-pattern{grid-template-columns:auto minmax(0,1fr);align-items:center;color:#17211d}
        body.design-view-active #view-design .input-section-canvas,body.design-view-active #reinforcementSection .input-section-canvas{display:none!important}
        body.design-view-active #reinforcementSection::after{content:"Reinforcement input section preview is hidden while Flexure / Shear is open to avoid duplicate section diagrams.";display:block;margin-top:8px;padding:10px 12px;border:1px solid rgba(23,33,29,.12);border-radius:8px;background:#f7faf8;color:#60706a;font-size:13px;line-height:1.35}
        @media(max-width:760px){.combo-card-head,.combo-factor-grid{grid-template-columns:1fr}}
      `;
      document.head.appendChild(style);
    }

    function patchGeometryKeyboard() {
      const canvas = q('geometry3dCanvas');
      if (!canvas || canvas.dataset.latestV4Keyboard) return;
      canvas.dataset.latestV4Keyboard = '1';
      canvas.tabIndex = 0;
      canvas.setAttribute('role', 'application');
      canvas.setAttribute('aria-label', '3D concrete section geometry editor. Use arrow keys to move the cut section.');
      const wrapper = canvas.closest('.canvas-wrap') || canvas.parentElement;
      if (wrapper && !wrapper.querySelector('.geometry-keyboard-hint')) {
        const hint = document.createElement('div');
        hint.className = 'geometry-keyboard-hint';
        hint.textContent = 'Click the 3D section, then use Left/Right to move the cut location and Up/Down to change cut depth. Hold Shift for larger steps. The drawing updates first, then analysis recalculates after you pause.';
        wrapper.appendChild(hint);
      }
      canvas.addEventListener('mouseenter', function(){ geometryArmed = true; });
      canvas.addEventListener('mouseleave', function(){ if (document.activeElement !== canvas) geometryArmed = false; });
      canvas.addEventListener('focus', function(){ geometryArmed = true; });
      canvas.addEventListener('pointerdown', function(event){
        geometryArmed = true;
        try { canvas.focus({ preventScroll: true }); } catch { try { canvas.focus(); } catch {} }
        event.preventDefault();
        event.stopImmediatePropagation();
        updateCutFromPointer(event, canvas);
      }, true);
      document.addEventListener('keydown', handleArrow, true);
    }

    function handleArrow(event) {
      if (!['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(event.key)) return;
      const canvas = q('geometry3dCanvas');
      if (!canvas) return;
      const tag = String(event.target && event.target.tagName || '').toLowerCase();
      const editing = event.target && (event.target.isContentEditable || ['input','select','textarea'].includes(tag));
      const focused = document.activeElement === canvas;
      if (editing && !focused) return;
      if (!focused && !geometryArmed) return;
      const limits = cutLimits(currentGeometryInput());
      if (!limits) return;
      let offset = Number(q('surfaceCutOffset') && q('surfaceCutOffset').value || 0);
      let depth = Number(q('surfaceCutDepth') && q('surfaceCutDepth').value || 0);
      const offsetStep = event.shiftKey ? 100 : 25;
      const depthStep = event.shiftKey ? 20 : 5;
      if (event.key === 'ArrowLeft') offset -= offsetStep;
      if (event.key === 'ArrowRight') offset += offsetStep;
      if (event.key === 'ArrowUp') depth -= depthStep;
      if (event.key === 'ArrowDown') depth += depthStep;
      applyCut({ offset, depth, width: limits.width, face: q('surfaceCutFace') && q('surfaceCutFace').value || 'top' }, limits);
      event.preventDefault();
      event.stopPropagation();
    }

    function updateCutFromPointer(event, canvas) {
      const limits = cutLimits(currentGeometryInput());
      if (!limits) return;
      const rect = canvas.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / Math.max(rect.width, 1)) * canvas.width;
      const y = ((event.clientY - rect.top) / Math.max(rect.height, 1)) * canvas.height;
      const offset = Math.round(((x / Math.max(canvas.width, 1)) * limits.overall - limits.width / 2) / 25) * 25;
      const depth = Math.round(Math.abs(y - canvas.height / 2) / 5) * 5;
      applyCut({ offset, depth, width: limits.width, face: y < canvas.height / 2 ? 'top' : 'bottom' }, limits);
    }

    function applyCut(values, limits) {
      limits = limits || cutLimits(currentGeometryInput());
      if (!limits) return;
      const width = clamp(values.width || limits.width, 0, limits.overall);
      const offset = clamp(values.offset, 0, Math.max(0, limits.overall - width));
      const depth = clamp(values.depth, 0, limits.maxDepth);
      if (q('surfaceCutEnabled')) q('surfaceCutEnabled').checked = true;
      if (q('surfaceCutFace')) q('surfaceCutFace').value = values.face || 'top';
      if (q('surfaceCutWidth')) q('surfaceCutWidth').value = width.toFixed(0);
      if (q('surfaceCutOffset')) q('surfaceCutOffset').value = offset.toFixed(0);
      if (q('surfaceCutDepth')) q('surfaceCutDepth').value = depth.toFixed(0);
      try { if (typeof drawInputSectionPreview === 'function') drawInputSectionPreview(); } catch {}
      clearTimeout(geometryTimer);
      geometryTimer = setTimeout(function(){ try { if (typeof safeRun === 'function') safeRun(); } catch {} }, 260);
    }

    function cutLimits(input) {
      if (!input) input = {};
      let overall = Number(input.b || q('width') && q('width').value || 1000);
      try { if (typeof sectionOverallWidth === 'function') overall = Number(sectionOverallWidth(input)); } catch {}
      overall = Math.max(50, overall || 1000);
      const depth = Math.max(80, Number(input.D || q('depth') && q('depth').value || 200));
      const existingWidth = Number(q('surfaceCutWidth') && q('surfaceCutWidth').value || input.surfaceCutWidth || 0);
      const width = existingWidth > 0 ? Math.min(overall, existingWidth) : Math.min(overall, Math.max(150, overall * 0.25));
      return { overall, width, maxDepth: Math.max(0, depth - 40) };
    }

    function currentGeometryInput() {
      try { if (typeof currentSectionPreviewInput === 'function') return currentSectionPreviewInput(); } catch {}
      try { if (typeof readInputs === 'function') return readInputs(); } catch {}
      try { return state && state.result && state.result.input || {}; } catch { return {}; }
    }

    function patchCombinationCards() {
      if (typeof renderCombinations !== 'function' || renderCombinations.latestV4Cards) { renderComboCards(); return; }
      const base = renderCombinations;
      renderCombinations = function(){
        const out = base.apply(this, arguments);
        renderComboCards();
        return out;
      };
      renderCombinations.latestV4Cards = true;
      renderComboCards();
    }

    function renderComboCards() {
      const rows = q('comboRows');
      let combos = null;
      try { combos = state && state.combinations; } catch {}
      if (!rows || !combos) return;
      const holder = rows.closest('.mini-table');
      if (!holder) return;
      const table = holder.querySelector('table');
      if (table) table.style.display = 'none';
      let grid = q('comboCardRows');
      if (!grid) {
        grid = document.createElement('div');
        grid.id = 'comboCardRows';
        grid.className = 'combo-card-editor';
        holder.appendChild(grid);
      }
      grid.innerHTML = combos.map(comboHtml).join('');
      grid.querySelectorAll('input,select').forEach(function(el){ el.addEventListener('change', comboChange); });
    }

    function comboHtml(combo, index) {
      const f = function(value){ try { return typeof formatComboFactor === 'function' ? formatComboFactor(value) : String(Number(value || 0)); } catch { return String(value || 0); } };
      return '<div class="combo-card" data-combo-card="' + index + '">' +
        '<div class="combo-card-head"><label>Name<input value="' + esc(combo.name) + '" data-combo-card-index="' + index + '" data-combo-card-field="name"></label>' +
        '<label>Type<select data-combo-card-index="' + index + '" data-combo-card-field="type">' +
        '<option value="ULS" ' + (combo.type === 'ULS' ? 'selected' : '') + '>ULS</option>' +
        '<option value="SLS" ' + (combo.type === 'SLS' ? 'selected' : '') + '>SLS</option>' +
        '<option value="DEF" ' + (combo.type === 'DEF' ? 'selected' : '') + '>DEF</option></select></label></div>' +
        '<div class="combo-factor-grid"><label>SW factor<input type="number" step="0.05" value="' + f(combo.sw) + '" data-combo-card-index="' + index + '" data-combo-card-field="sw"></label>' +
        '<label>G factor<input type="number" step="0.05" value="' + f(combo.g) + '" data-combo-card-index="' + index + '" data-combo-card-field="g"></label>' +
        '<label>Q factor<input type="number" step="0.05" value="' + f(combo.q) + '" data-combo-card-index="' + index + '" data-combo-card-field="q"></label>' +
        '<label class="combo-pattern"><input type="checkbox" ' + (combo.pattern ? 'checked' : '') + ' data-combo-card-index="' + index + '" data-combo-card-field="pattern">Pattern</label></div></div>';
    }

    function comboChange(event) {
      let combos = null;
      try { combos = state && state.combinations; } catch {}
      const combo = combos && combos[Number(event.currentTarget.dataset.comboCardIndex)];
      if (!combo) return;
      const field = event.currentTarget.dataset.comboCardField;
      if (field === 'pattern') combo.pattern = event.currentTarget.checked;
      else if (['sw','g','q'].includes(field)) combo[field] = Number(event.currentTarget.value);
      else combo[field] = event.currentTarget.value;
      try { if (typeof renderCombinations === 'function') renderCombinations(); } catch {}
      try { if (typeof safeRun === 'function') safeRun(); } catch {}
    }

    function patchDesignDuplicate() {
      syncDesignClass();
      if (typeof switchTab === 'function' && !switchTab.latestV4Design) {
        const base = switchTab;
        switchTab = function(view){
          const out = base.apply(this, arguments);
          syncDesignClass();
          return out;
        };
        switchTab.latestV4Design = true;
      }
      document.querySelectorAll('.tab[data-view="design"],.menu-action[data-view="design"]').forEach(function(btn){
        if (btn.dataset.latestV4Design) return;
        btn.dataset.latestV4Design = '1';
        btn.addEventListener('click', function(){ setTimeout(syncDesignClass, 0); });
      });
    }

    function syncDesignClass() {
      document.body.classList.toggle('design-view-active', !!(q('view-design') && q('view-design').classList.contains('active')));
    }
  }
})();
  </script>
</body>
</html>
