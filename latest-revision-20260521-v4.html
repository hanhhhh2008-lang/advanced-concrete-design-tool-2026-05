<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Concrete Design Tool - Latest Revision v4 corrected</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f4f7f5;color:#17211d;font-family:system-ui,Segoe UI,Arial,sans-serif}
    .loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}.loading b{color:#126b63}
  </style>
</head>
<body>
  <div class="loading"><div><b>Loading corrected latest revision...</b><br>Direct build with two end columns in the two-way panel.</div></div>
  <script>
(async function () {
  const response = await fetch('index.html?base=v4-corrected-direct-2', { cache: 'no-store' });
  let html = await response.text();
  html = html.replace(/<script src="analysis-manual-fixes\.js[^>]*><\/script>\s*/g, '');
  document.open();
  document.write(html);
  document.close();
  let tries = 0;
  const timer = setInterval(function () {
    tries += 1;
    try { patchApp(); } catch (error) { console.warn('Corrected patch retry', error); }
    if (window.__correctedV4PatchReady || tries > 100) clearInterval(timer);
  }, 250);
})().catch(function (error) {
  document.body.innerHTML = '<div class="loading"><div><b>Could not load corrected revision.</b><br>' + String(error) + '</div></div>';
});

function patchApp() {
  const q = (id) => document.getElementById(id);
  const clamp = (value, lo, hi) => Math.max(lo, Math.min(hi, Number(value) || 0));
  const esc = (value) => String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  let geometryTimer = window.__geometryTimer || null;
  let geometryArmed = Boolean(window.__geometryArmed);
  function stateRef(){ try { return typeof state !== 'undefined' ? state : null; } catch { return null; } }

  injectStyles();
  const modelReady = patchTwoWayModel();
  patchGeometryKeyboard();
  patchCombinationCards();
  patchDesignDuplicate();
  if (modelReady) {
    try { if (typeof safeRun === 'function') safeRun(); } catch {}
    window.__correctedV4PatchReady = true;
  }

  function injectStyles(){
    if(q('correctedV4Styles')) return;
    const style=document.createElement('style');
    style.id='correctedV4Styles';
    style.textContent=`
      .input-panel label,.menu-dropdown button,.tree-item,.model-info-panel,.model-info-row,.model-info-row b{min-width:0;overflow-wrap:anywhere}
      .geometry-keyboard-hint{margin-top:8px;padding:10px 12px;border:1px solid rgba(23,33,29,.12);border-radius:8px;background:#f7faf8;color:#33443d;font-size:13px;line-height:1.35}
      .combo-card-editor{display:grid;gap:10px}.combo-card{display:grid;gap:8px;padding:10px;border:1px solid rgba(23,33,29,.12);border-radius:8px;background:#fff}
      .combo-card-head,.combo-factor-grid{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(72px,.6fr);gap:8px}.combo-factor-grid{grid-template-columns:repeat(4,minmax(0,1fr));align-items:end}
      .combo-card label{display:grid;gap:4px;min-width:0;font-size:12px;color:#60706a}.combo-card input,.combo-card select{width:100%;min-width:0;box-sizing:border-box}.combo-card .combo-pattern{grid-template-columns:auto minmax(0,1fr);align-items:center;color:#17211d}
      body.design-view-active #view-design .input-section-canvas,body.design-view-active #reinforcementSection .input-section-canvas{display:none!important}
      body.design-view-active #reinforcementSection::after{content:"Reinforcement input section preview is hidden while Flexure / Shear is open to avoid duplicate section diagrams.";display:block;margin-top:8px;padding:10px 12px;border:1px solid rgba(23,33,29,.12);border-radius:8px;background:#f7faf8;color:#60706a;font-size:13px;line-height:1.35}
      @media(max-width:760px){.combo-card-head,.combo-factor-grid{grid-template-columns:1fr}}
    `;
    document.head.appendChild(style);
  }

  function patchTwoWayModel(){
    if(typeof drawModel !== 'function') return false;
    if(drawModel.correctedTwoWayColumns) return true;
    const base = drawModel;
    drawModel = function(){
      const st = stateRef();
      if(st && st.result && st.result.mode === 'twoWay'){
        drawCorrectTwoWayModel(st.result.input);
        return;
      }
      return base.apply(this, arguments);
    };
    drawModel.correctedTwoWayColumns = true;
    return true;
  }

  function drawCorrectTwoWayModel(input){
    const canvas=q('modelCanvas');
    if(!canvas || !canvas.getContext || !input) return;
    canvas.width=1400; canvas.height=790;
    const ctx=canvas.getContext('2d');
    clear(ctx,canvas);
    ctx.fillStyle='#17211d'; ctx.font='28px system-ui';
    ctx.fillText('Two-way slab X-direction equivalent strip model',34,42);
    ctx.fillStyle='#60706a'; ctx.font='18px system-ui';
    ctx.fillText('Single span shows two end columns. Multiple spans show every X support column.',34,66);
    drawPlan(ctx,{x:70,y:108,w:560,h:300},input);
    drawStrip(ctx,{x:90,y:650,w:1180},input);
    drawLegend(ctx,750,118,input);
  }

  function spansX(input){
    const st=stateRef();
    const raw=Array.isArray(input.twoWaySpansX)&&input.twoWaySpansX.length?input.twoWaySpansX:Array.isArray(st?.twoWaySpansX)&&st.twoWaySpansX.length?st.twoWaySpansX:[input.panelX||1];
    const spans=raw.map((s)=>Math.max(0.5,Number(s.length??s)||0.5));
    return spans.length?spans:[Math.max(0.5,Number(input.panelX)||1)];
  }
  function supportPositions(r, spans){ const total=spans.reduce((a,b)=>a+b,0)||1; const xs=[r.x]; let x=r.x; spans.forEach((span)=>{ x+=span/total*r.w; xs.push(x); }); return xs; }

  function drawPlan(ctx,r,input){
    const spans=spansX(input); const total=spans.reduce((a,b)=>a+b,0)||1;
    ctx.fillStyle='#f7fbff'; ctx.strokeStyle='#17211d'; ctx.lineWidth=2.5; ctx.fillRect(r.x,r.y,r.w,r.h); ctx.strokeRect(r.x,r.y,r.w,r.h);
    const stripH=clamp((input.columnStripPercent||50)/100,0.2,0.85)*r.h;
    ctx.fillStyle='rgba(10,132,255,.14)'; ctx.fillRect(r.x,r.y+r.h/2-stripH/2,r.w,stripH);
    ctx.fillStyle='rgba(255,138,31,.12)'; ctx.fillRect(r.x,r.y,r.w,r.h/2-stripH/2); ctx.fillRect(r.x,r.y+r.h/2+stripH/2,r.w,r.h/2-stripH/2);
    let x=r.x;
    spans.forEach((span,i)=>{ const next=x+span/total*r.w; ctx.strokeStyle='rgba(23,33,29,.35)'; ctx.lineWidth=1.7; ctx.setLineDash(i===0?[]:[6,6]); ctx.beginPath(); ctx.moveTo(x,r.y); ctx.lineTo(x,r.y+r.h); ctx.stroke(); ctx.setLineDash([]); label(ctx,'L'+(i+1)+' '+span.toFixed(2)+' m',(x+next)/2,r.y+r.h+26,'#17211d','center'); x=next; });
    ctx.beginPath(); ctx.moveTo(r.x+r.w,r.y); ctx.lineTo(r.x+r.w,r.y+r.h); ctx.stroke();
    const supports=supportPositions(r,spans);
    supports.forEach((sx,i)=>drawPlanColumn(ctx,sx,r.y+r.h/2,input,'C'+(i+1),i===0?'left':i===supports.length-1?'right':'center'));
    if(Number(input.transferLoadKn||0)>0){ const tx=r.x+clamp((input.transferX||input.panelX/2)/Math.max(input.panelX||total,1),0,1)*r.w; const ty=r.y+clamp((input.transferY||input.panelY/2)/Math.max(input.panelY||1,1),0,1)*r.h; drawTransfer(ctx,tx,ty,Number(input.transferLoadKn).toFixed(0)+' kN'); }
    label(ctx,'Plan '+Number(input.panelX||total).toFixed(2)+' m x '+Number(input.panelY||0).toFixed(2)+' m',r.x+r.w/2,r.y-18,'#17211d','center');
    label(ctx,'column strip',r.x+18,r.y+r.h/2-stripH/2+26,'#126b63','left'); label(ctx,'middle strip zone',r.x+18,r.y+r.h-18,'#60706a','left');
  }
  function drawPlanColumn(ctx,x,y,input,text,align){ const w=Math.max(26,Math.min(76,Number(input.columnX||450)/10)); const h=Math.max(26,Math.min(76,Number(input.columnY||450)/10)); const dx=align==='left'?w/2+3:align==='right'?-w/2-3:0; ctx.fillStyle='rgba(96,112,106,.24)'; ctx.strokeStyle='#60706a'; ctx.lineWidth=2; ctx.fillRect(x-w/2,y-h/2,w,h); ctx.strokeRect(x-w/2,y-h/2,w,h); label(ctx,text+' column',x+dx,y+h/2+22,'#60706a',align); }
  function drawStrip(ctx,r,input){ const spans=spansX(input); const total=spans.reduce((a,b)=>a+b,0)||1; const y=r.y; ctx.strokeStyle='#17211d'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(r.x,y); ctx.lineTo(r.x+r.w,y); ctx.stroke(); supportPositions(r,spans).forEach((sx,i)=>drawStripColumn(ctx,sx,y,'C'+(i+1))); let x=r.x; spans.forEach((span,i)=>{ const next=x+span/total*r.w; drawLoadArrows(ctx,x+24,next-24,y-118,input); label(ctx,'L'+(i+1)+' '+span.toFixed(2)+' m',(x+next)/2,y+44,'#17211d','center'); x=next; }); if(Number(input.transferLoadKn||0)>0){ const tx=r.x+clamp((input.transferX||total/2)/Math.max(total,1),0,1)*r.w; drawTransfer(ctx,tx,y-8,Number(input.transferLoadKn).toFixed(0)+' kN'); } label(ctx,'columns shown at both ends and every internal X support',r.x+r.w-4,y+132,'#60706a','right'); }
  function drawStripColumn(ctx,x,beamY,text){ const w=34,h=72,top=beamY+8; ctx.fillStyle='rgba(96,112,106,.22)'; ctx.strokeStyle='#60706a'; ctx.lineWidth=2; ctx.fillRect(x-w/2,top,w,h); ctx.strokeRect(x-w/2,top,w,h); ctx.strokeStyle='rgba(96,112,106,.35)'; ctx.beginPath(); ctx.moveTo(x,beamY-18); ctx.lineTo(x,top+h); ctx.stroke(); label(ctx,text,x,top+h+24,'#60706a','center'); }
  function drawLoadArrows(ctx,x1,x2,yTop,input){ if(x2<=x1)return; ctx.strokeStyle='#bd5b32'; ctx.fillStyle='#bd5b32'; ctx.lineWidth=2; const count=Math.max(2,Math.min(5,Math.floor((x2-x1)/80))); for(let i=0;i<count;i++){ const x=count===1?(x1+x2)/2:x1+(x2-x1)*i/(count-1); ctx.beginPath(); ctx.moveTo(x,yTop); ctx.lineTo(x,yTop+72); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x-6,yTop+60); ctx.lineTo(x,yTop+74); ctx.lineTo(x+6,yTop+60); ctx.stroke(); } label(ctx,input.ptEnabled?'area load minus PT uplift':'area load',(x1+x2)/2,yTop+98,'#bd5b32','center'); }
  function drawTransfer(ctx,x,y,text){ ctx.strokeStyle='#c62828'; ctx.fillStyle='rgba(198,40,40,.16)'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(x,y,16,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y-62); ctx.lineTo(x,y-20); ctx.stroke(); label(ctx,'transfer '+text,x,y-74,'#c62828','center'); }
  function drawLegend(ctx,x,y,input){ const rows=[['#0a84ff','column strip'],['#ff8a1f','middle strip'],['#60706a','support column'],['#bd5b32','gravity/transfer load']]; info(ctx,x,y,540,'Diagram Legend',rows,'Single span has two support columns: one at the left end and one at the right end. Multi-span strips show all support columns.'); }

  function patchGeometryKeyboard(){ const canvas=q('geometry3dCanvas'); if(!canvas||canvas.dataset.correctedKeyboard)return; canvas.dataset.correctedKeyboard='1'; canvas.tabIndex=0; canvas.setAttribute('role','application'); const wrapper=canvas.closest('.canvas-wrap')||canvas.parentElement; if(wrapper&&!wrapper.querySelector('.geometry-keyboard-hint')){ const hint=document.createElement('div'); hint.className='geometry-keyboard-hint'; hint.textContent='Click the 3D section, then use Left/Right to move the cut location and Up/Down to change cut depth. Hold Shift for larger steps.'; wrapper.appendChild(hint); } canvas.addEventListener('mouseenter',()=>{geometryArmed=true; window.__geometryArmed=true}); canvas.addEventListener('mouseleave',()=>{if(document.activeElement!==canvas){geometryArmed=false; window.__geometryArmed=false}}); canvas.addEventListener('focus',()=>{geometryArmed=true; window.__geometryArmed=true}); canvas.addEventListener('pointerdown',(event)=>{geometryArmed=true; window.__geometryArmed=true; try{canvas.focus({preventScroll:true})}catch{} event.preventDefault(); event.stopImmediatePropagation(); updateCutFromPointer(event,canvas);},true); document.addEventListener('keydown',handleGeometryKey,true); }
  function handleGeometryKey(event){ if(!['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(event.key))return; const canvas=q('geometry3dCanvas'); if(!canvas)return; const tag=String(event.target?.tagName||'').toLowerCase(); const editing=event.target?.isContentEditable||['input','select','textarea'].includes(tag); const focused=document.activeElement===canvas; if(editing&&!focused)return; if(!focused&&!geometryArmed)return; const limits=cutLimits(currentGeometryInput()); let offset=Number(q('surfaceCutOffset')?.value||0); let depth=Number(q('surfaceCutDepth')?.value||0); if(event.key==='ArrowLeft')offset-=event.shiftKey?100:25; if(event.key==='ArrowRight')offset+=event.shiftKey?100:25; if(event.key==='ArrowUp')depth-=event.shiftKey?20:5; if(event.key==='ArrowDown')depth+=event.shiftKey?20:5; applyCut({offset,depth,width:limits.width,face:q('surfaceCutFace')?.value||'top'},limits); event.preventDefault(); event.stopPropagation(); }
  function updateCutFromPointer(event,canvas){ const limits=cutLimits(currentGeometryInput()); const rect=canvas.getBoundingClientRect(); const x=((event.clientX-rect.left)/Math.max(rect.width,1))*canvas.width; const y=((event.clientY-rect.top)/Math.max(rect.height,1))*canvas.height; const offset=Math.round(((x/Math.max(canvas.width,1))*limits.overall-limits.width/2)/25)*25; const depth=Math.round(Math.abs(y-canvas.height/2)/5)*5; applyCut({offset,depth,width:limits.width,face:y<canvas.height/2?'top':'bottom'},limits); }
  function applyCut(values,limits){ const width=clamp(values.width||limits.width,0,limits.overall); const offset=clamp(values.offset,0,Math.max(0,limits.overall-width)); const depth=clamp(values.depth,0,limits.maxDepth); if(q('surfaceCutEnabled'))q('surfaceCutEnabled').checked=true; if(q('surfaceCutFace'))q('surfaceCutFace').value=values.face||'top'; if(q('surfaceCutDepth'))q('surfaceCutDepth').value=depth.toFixed(0); if(q('surfaceCutWidth'))q('surfaceCutWidth').value=width.toFixed(0); if(q('surfaceCutOffset'))q('surfaceCutOffset').value=offset.toFixed(0); try{if(typeof drawInputSectionPreview==='function')drawInputSectionPreview()}catch{} clearTimeout(geometryTimer); geometryTimer=setTimeout(()=>{try{if(typeof safeRun==='function')safeRun()}catch{}},260); window.__geometryTimer=geometryTimer; }
  function cutLimits(input){ input=input||{}; let overall=Number(input.b||q('width')?.value||1000); try{if(typeof sectionOverallWidth==='function')overall=Number(sectionOverallWidth(input))}catch{} overall=Math.max(50,overall||1000); const depth=Math.max(80,Number(input.D||q('depth')?.value||200)); const existing=Number(q('surfaceCutWidth')?.value||input.surfaceCutWidth||0); const width=existing>0?Math.min(overall,existing):Math.min(overall,Math.max(150,overall*.25)); return{overall,width,maxDepth:Math.max(0,depth-40)}; }
  function currentGeometryInput(){ try{if(typeof currentSectionPreviewInput==='function')return currentSectionPreviewInput()}catch{} try{if(typeof readInputs==='function')return readInputs()}catch{} return stateRef()?.result?.input||{}; }

  function patchCombinationCards(){ if(typeof renderCombinations!=='function'||renderCombinations.correctedCards)return; const base=renderCombinations; renderCombinations=function(){ const out=base.apply(this,arguments); renderComboCards(); return out; }; renderCombinations.correctedCards=true; setTimeout(renderComboCards,0); }
  function renderComboCards(){ const rows=q('comboRows'); const combos=stateRef()?.combinations; if(!rows||!combos)return; const holder=rows.closest('.mini-table'); if(!holder)return; const table=holder.querySelector('table'); if(table)table.style.display='none'; let grid=q('comboCardRows'); if(!grid){grid=document.createElement('div'); grid.id='comboCardRows'; grid.className='combo-card-editor'; holder.appendChild(grid);} grid.innerHTML=combos.map(comboHtml).join(''); grid.querySelectorAll('input,select').forEach((el)=>el.addEventListener('change',comboChange)); }
  function comboHtml(combo,index){ const f=(v)=>{try{return typeof formatComboFactor==='function'?formatComboFactor(v):Number(v||0).toFixed(3).replace(/\.?0+$/,'')}catch{return String(v||0)}}; return '<div class="combo-card"><div class="combo-card-head"><label>Name<input value="'+esc(combo.name)+'" data-combo-card-index="'+index+'" data-combo-card-field="name"></label><label>Type<select data-combo-card-index="'+index+'" data-combo-card-field="type"><option value="ULS" '+(combo.type==='ULS'?'selected':'')+'>ULS</option><option value="SLS" '+(combo.type==='SLS'?'selected':'')+'>SLS</option><option value="DEF" '+(combo.type==='DEF'?'selected':'')+'>DEF</option></select></label></div><div class="combo-factor-grid"><label>SW factor<input type="number" step="0.05" value="'+f(combo.sw)+'" data-combo-card-index="'+index+'" data-combo-card-field="sw"></label><label>G factor<input type="number" step="0.05" value="'+f(combo.g)+'" data-combo-card-index="'+index+'" data-combo-card-field="g"></label><label>Q factor<input type="number" step="0.05" value="'+f(combo.q)+'" data-combo-card-index="'+index+'" data-combo-card-field="q"></label><label class="combo-pattern"><input type="checkbox" '+(combo.pattern?'checked':'')+' data-combo-card-index="'+index+'" data-combo-card-field="pattern">Pattern</label></div></div>'; }
  function comboChange(event){ const combo=stateRef()?.combinations?.[Number(event.currentTarget.dataset.comboCardIndex)]; if(!combo)return; const field=event.currentTarget.dataset.comboCardField; if(field==='pattern')combo.pattern=event.currentTarget.checked; else if(['sw','g','q'].includes(field))combo[field]=Number(event.currentTarget.value); else combo[field]=event.currentTarget.value; if(typeof renderCombinations==='function')renderCombinations(); if(typeof safeRun==='function')safeRun(); }
  function patchDesignDuplicate(){ syncDesign(); if(typeof switchTab==='function'&&!switchTab.correctedDesign){ const base=switchTab; switchTab=function(view){ const out=base.apply(this,arguments); syncDesign(); return out; }; switchTab.correctedDesign=true; } document.querySelectorAll('.tab[data-view="design"],.menu-action[data-view="design"]').forEach((el)=>{ if(!el.dataset.correctedDesignClick){ el.dataset.correctedDesignClick='1'; el.addEventListener('click',()=>setTimeout(syncDesign,0)); }}); }
  function syncDesign(){ document.body.classList.toggle('design-view-active',Boolean(q('view-design')?.classList.contains('active'))); }
  function clear(ctx,canvas){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); }
  function info(ctx,x,y,w,title,rows,note){ ctx.fillStyle='#fff'; ctx.strokeStyle='rgba(23,33,29,.14)'; ctx.lineWidth=1.5; round(ctx,x,y,w,260,8); ctx.fill(); ctx.stroke(); ctx.fillStyle='#17211d'; ctx.font='22px system-ui'; ctx.fillText(title,x+16,y+30); rows.forEach((r,i)=>{ctx.fillStyle=r[0]; ctx.fillRect(x+18,y+62+i*34,14,14); ctx.fillStyle='#17211d'; ctx.font='17px system-ui'; ctx.fillText(r[1],x+44,y+75+i*34);}); ctx.fillStyle='#60706a'; ctx.font='16px system-ui'; wrap(ctx,note,x+18,y+214,500,18); }
  function label(ctx,text,x,y,color,align){ ctx.save(); ctx.font='20px system-ui'; const t=String(text); const w=ctx.measureText(t).width+12; const h=32; const left=align==='center'?x-w/2:align==='right'?x-w:x; ctx.fillStyle='rgba(255,255,255,.94)'; ctx.strokeStyle='rgba(23,33,29,.12)'; round(ctx,left,y-h+6,w,h,5); ctx.fill(); ctx.stroke(); ctx.fillStyle=color||'#17211d'; ctx.fillText(t,left+6,y-4); ctx.restore(); }
  function round(ctx,x,y,w,h,r){ const rr=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+rr,y); ctx.lineTo(x+w-rr,y); ctx.quadraticCurveTo(x+w,y,x+w,y+rr); ctx.lineTo(x+w,y+h-rr); ctx.quadraticCurveTo(x+w,y+h,x+w-rr,y+h); ctx.lineTo(x+rr,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-rr); ctx.lineTo(x,y+rr); ctx.quadraticCurveTo(x,y,x+rr,y); ctx.closePath(); }
  function wrap(ctx,text,x,y,maxW,lh){ const words=String(text).split(/\s+/); let line=''; words.forEach((word,i)=>{ const test=line?line+' '+word:word; if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,x,y); line=word; y+=lh;}else line=test; if(i===words.length-1&&line)ctx.fillText(line,x,y); }); }
}
  </script>
</body>
</html>
