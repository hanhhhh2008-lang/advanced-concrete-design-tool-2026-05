<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Concrete Design Tool - Latest Revision</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#f4f7f5; }
    #review { width:100vw; height:100vh; border:0; display:block; }
    #loading { position:fixed; inset:0; display:grid; place-items:center; font:15px system-ui; color:#33443d; background:#f4f7f5; z-index:3; }
  </style>
</head>
<body>
  <div id="loading">Loading latest revision...</div>
  <iframe id="review" src="analysis-review-20260521.html?latest_base=20260521"></iframe>
  <script>
(function () {
  const review = document.getElementById('review');
  const loading = document.getElementById('loading');
  review.addEventListener('load', armPatch);
  armPatch();

  function armPatch() {
    let tries = 0;
    const timer = setInterval(() => {
      tries += 1;
      try {
        const inner = review.contentDocument && review.contentDocument.getElementById('app');
        const appDoc = inner && inner.contentDocument;
        if (!appDoc || !appDoc.getElementById('runAnalysisBtn')) {
          if (tries > 80) clearInterval(timer);
          return;
        }
        if (!appDoc.getElementById('latestRevisionPatch')) {
          const script = appDoc.createElement('script');
          script.id = 'latestRevisionPatch';
          script.textContent = '(' + latestRevisionPatch.toString() + ')();';
          appDoc.documentElement.appendChild(script);
        }
        if (loading) loading.style.display = 'none';
        clearInterval(timer);
      } catch (error) {
        if (tries > 80) clearInterval(timer);
      }
    }, 250);
  }

  function latestRevisionPatch() {
    if (window.__latestRevisionPatchStarted) return;
    window.__latestRevisionPatchStarted = true;
    const q = (id) => document.getElementById(id);
    const stateRef = () => { try { return state; } catch { return null; } };
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, Number(v) || 0));

    patchTwoWayModelColumns();
    patchDeflectionScale();
    setTimeout(() => { try { if (typeof safeRun === 'function') safeRun(); } catch {} }, 80);

    function patchTwoWayModelColumns() {
      if (typeof drawModel !== 'function' || drawModel.latestRevisionColumns) return;
      const baseDrawModel = drawModel;
      drawModel = function () {
        const st = stateRef();
        if (st && st.result && st.result.mode === 'twoWay') {
          drawLatestTwoWayModel(st.result.input);
          try { if (typeof augmentModelInfo === 'function') augmentModelInfo(); } catch {}
          return;
        }
        return baseDrawModel.apply(this, arguments);
      };
      drawModel.latestRevisionColumns = true;
    }

    function drawLatestTwoWayModel(input) {
      const canvas = q('modelCanvas');
      if (!canvas || !canvas.getContext || !input) return;
      canvas.width = 1400;
      canvas.height = 790;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#17211d'; ctx.font = '28px system-ui';
      ctx.fillText('Two-way slab X-direction equivalent strip model', 34, 42);
      ctx.fillStyle = '#60706a'; ctx.font = '18px system-ui';
      ctx.fillText('Plan view shows all X support columns. Single span has two end columns; multiple spans show every support column.', 34, 66);
      const plan = { x: 70, y: 108, w: 560, h: 300 };
      drawPlan(ctx, plan, input);
      drawStrip(ctx, { x: 90, y: 650, w: 1180 }, input);
      drawLegend(ctx, 750, 118, input);
    }

    function spansX(input) {
      const st = stateRef();
      const raw = (input && Array.isArray(input.twoWaySpansX) && input.twoWaySpansX.length ? input.twoWaySpansX : st && Array.isArray(st.twoWaySpansX) && st.twoWaySpansX.length ? st.twoWaySpansX : [{ length: input.panelX || 1 }]);
      const spans = raw.map(s => Math.max(0.5, Number(s.length || s || 0))).filter(Boolean);
      return spans.length ? spans : [Math.max(0.5, Number(input.panelX || 1))];
    }

    function drawPlan(ctx, r, input) {
      const spans = spansX(input);
      const total = spans.reduce((a, b) => a + b, 0) || Math.max(1, input.panelX || 1);
      ctx.fillStyle = '#f7fbff'; ctx.strokeStyle = '#17211d'; ctx.lineWidth = 2.5;
      ctx.fillRect(r.x, r.y, r.w, r.h); ctx.strokeRect(r.x, r.y, r.w, r.h);
      const stripH = clamp((input.columnStripPercent || 50) / 100, 0.2, 0.85) * r.h;
      ctx.fillStyle = 'rgba(10,132,255,.14)'; ctx.fillRect(r.x, r.y + r.h / 2 - stripH / 2, r.w, stripH);
      ctx.fillStyle = 'rgba(255,138,31,.12)'; ctx.fillRect(r.x, r.y, r.w, r.h / 2 - stripH / 2); ctx.fillRect(r.x, r.y + r.h / 2 + stripH / 2, r.w, r.h / 2 - stripH / 2);
      const supports = [r.x];
      let x = r.x;
      spans.forEach((span, i) => {
        const next = x + span / total * r.w;
        ctx.strokeStyle = 'rgba(23,33,29,.35)'; ctx.lineWidth = 1.7; ctx.setLineDash(i === 0 ? [] : [6, 6]);
        ctx.beginPath(); ctx.moveTo(x, r.y); ctx.lineTo(x, r.y + r.h); ctx.stroke(); ctx.setLineDash([]);
        label(ctx, 'L' + (i + 1) + ' ' + span.toFixed(2) + ' m', (x + next) / 2, r.y + r.h + 26, '#17211d', 'center');
        x = next; supports.push(x);
      });
      ctx.beginPath(); ctx.moveTo(r.x + r.w, r.y); ctx.lineTo(r.x + r.w, r.y + r.h); ctx.stroke();
      supports.forEach((sx, i) => drawPlanColumn(ctx, sx, r.y + r.h / 2, input, 'C' + (i + 1), i === 0 ? 'left' : i === supports.length - 1 ? 'right' : 'center'));
      const tx = r.x + clamp((input.transferX || input.panelX / 2) / Math.max(input.panelX || total, 1), 0, 1) * r.w;
      const ty = r.y + clamp((input.transferY || input.panelY / 2) / Math.max(input.panelY || 1, 1), 0, 1) * r.h;
      if (Number(input.transferLoadKn || 0) > 0) drawTransfer(ctx, tx, ty, Number(input.transferLoadKn).toFixed(0) + ' kN');
      label(ctx, 'Plan ' + Number(input.panelX || total).toFixed(2) + ' m x ' + Number(input.panelY || 0).toFixed(2) + ' m', r.x + r.w / 2, r.y - 18, '#17211d', 'center');
      label(ctx, 'column strip', r.x + 18, r.y + r.h / 2 - stripH / 2 + 26, '#126b63', 'left');
      label(ctx, 'middle strip zone', r.x + 18, r.y + r.h - 18, '#60706a', 'left');
    }

    function drawPlanColumn(ctx, x, y, input, txt, align) {
      const w = Math.max(26, Math.min(76, Number(input.columnX || 450) / 10));
      const h = Math.max(26, Math.min(76, Number(input.columnY || 450) / 10));
      const dx = align === 'left' ? w / 2 + 3 : align === 'right' ? -w / 2 - 3 : 0;
      ctx.fillStyle = 'rgba(96,112,106,.24)'; ctx.strokeStyle = '#60706a'; ctx.lineWidth = 2;
      ctx.fillRect(x - w / 2, y - h / 2, w, h); ctx.strokeRect(x - w / 2, y - h / 2, w, h);
      label(ctx, txt + ' column', x + dx, y + h / 2 + 22, '#60706a', align);
    }

    function drawStrip(ctx, r, input) {
      const spans = spansX(input);
      const total = spans.reduce((a, b) => a + b, 0) || 1;
      const y = r.y;
      ctx.strokeStyle = '#17211d'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(r.x, y); ctx.lineTo(r.x + r.w, y); ctx.stroke();
      const supports = [r.x]; let x = r.x;
      spans.forEach(span => { x += span / total * r.w; supports.push(x); });
      supports.forEach((sx, i) => drawStripColumn(ctx, sx, y, 'C' + (i + 1)));
      x = r.x;
      spans.forEach((span, i) => {
        const next = x + span / total * r.w;
        drawLoadArrows(ctx, x + 24, next - 24, y - 118, input, i);
        label(ctx, 'L' + (i + 1) + ' ' + span.toFixed(2) + ' m', (x + next) / 2, y + 44, '#17211d', 'center');
        x = next;
      });
      if (Number(input.transferLoadKn || 0) > 0) {
        const tx = r.x + clamp((input.transferX || total / 2) / Math.max(total, 1), 0, 1) * r.w;
        drawTransfer(ctx, tx, y - 8, Number(input.transferLoadKn).toFixed(0) + ' kN');
      }
      const balance = input.ptEnabled && typeof ptTwoWayBalancedLoad === 'function' ? ptTwoWayBalancedLoad(input) : 0;
      const pa = input.ptEnabled && typeof ptPAStress === 'function' ? ptPAStress(input).toFixed(2) : 'off';
      label(ctx, input.ptEnabled ? 'P/A ' + pa + ' MPa changes PT uplift ' + balance.toFixed(2) + ' kPa and deflection' : 'PT off: no P/A uplift in deflection', r.x + 610, y - 56, input.ptEnabled ? '#a16207' : '#60706a', 'left');
      label(ctx, 'columns shown at every X support line', r.x + r.w - 4, y + 132, '#60706a', 'right');
    }

    function drawStripColumn(ctx, x, beamY, txt) {
      const w = 34, h = 72, top = beamY + 8;
      ctx.fillStyle = 'rgba(96,112,106,.22)'; ctx.strokeStyle = '#60706a'; ctx.lineWidth = 2;
      ctx.fillRect(x - w / 2, top, w, h); ctx.strokeRect(x - w / 2, top, w, h);
      ctx.strokeStyle = 'rgba(96,112,106,.35)'; ctx.beginPath(); ctx.moveTo(x, beamY - 18); ctx.lineTo(x, top + h); ctx.stroke();
      label(ctx, txt, x, top + h + 24, '#60706a', 'center');
    }

    function drawLoadArrows(ctx, x1, x2, yTop, input, idx) {
      if (x2 <= x1) return;
      ctx.strokeStyle = '#bd5b32'; ctx.fillStyle = '#bd5b32'; ctx.lineWidth = 2;
      const count = Math.max(2, Math.min(5, Math.floor((x2 - x1) / 80)));
      for (let i = 0; i < count; i++) {
        const x = count === 1 ? (x1 + x2) / 2 : x1 + (x2 - x1) * i / (count - 1);
        ctx.beginPath(); ctx.moveTo(x, yTop); ctx.lineTo(x, yTop + 72); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x - 6, yTop + 60); ctx.lineTo(x, yTop + 74); ctx.lineTo(x + 6, yTop + 60); ctx.stroke();
      }
      label(ctx, input.ptEnabled ? 'area load minus PT uplift' : 'area load', (x1 + x2) / 2, yTop + 98, '#bd5b32', 'center');
    }

    function drawTransfer(ctx, x, y, txt) {
      ctx.strokeStyle = '#c62828'; ctx.fillStyle = 'rgba(198,40,40,.16)'; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(x, y, 16, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#c62828'; ctx.beginPath(); ctx.moveTo(x, y - 62); ctx.lineTo(x, y - 20); ctx.stroke();
      label(ctx, 'transfer ' + txt, x, y - 74, '#c62828', 'center');
    }

    function drawLegend(ctx, x, y, input) {
      const rows = [['#0a84ff', 'column strip'], ['#ff8a1f', 'middle strip'], ['#60706a', 'support column'], ['#bd5b32', 'gravity/transfer load']];
      if (input.ptEnabled) rows.push(['#a16207', 'PT P/A balanced uplift affects deflection']);
      ctx.fillStyle = '#fff'; ctx.strokeStyle = 'rgba(23,33,29,.14)'; ctx.lineWidth = 1.5; rounded(ctx, x, y, 540, 260, 8); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#17211d'; ctx.font = '22px system-ui'; ctx.fillText('Diagram Legend', x + 16, y + 30);
      rows.forEach((r, i) => { ctx.fillStyle = r[0]; ctx.fillRect(x + 18, y + 62 + i * 34, 14, 14); ctx.fillStyle = '#17211d'; ctx.font = '17px system-ui'; ctx.fillText(r[1], x + 44, y + 75 + i * 34); });
      ctx.fillStyle = '#60706a'; ctx.font = '16px system-ui'; wrap(ctx, 'The drawing keeps locations and load path clear; model numbers are shown in the side summary, report and deflection panel.', x + 18, y + 214, 500, 18);
    }

    function patchDeflectionScale() {
      if (typeof drawDeflectionComparisonDiagram === 'function' && !drawDeflectionComparisonDiagram.latestRevisionScale) {
        drawDeflectionComparisonDiagram = function (ctx, canvas, samples, pad, axisY, height, title, shortColor, longColor, lowPoints) {
          if (!samples || !samples.length) return;
          const input = stateRef() && stateRef().result && stateRef().result.input;
          const total = Math.max(1e-9, Number(samples[samples.length - 1].x) || 1);
          const shortMax = Math.max(0, ...samples.map(s => Number(s.shortMm) || 0));
          const longMax = Math.max(0, ...samples.map(s => Number(s.longMm) || 0));
          const limitMin = Math.min(...samples.map(s => Number(s.limitMm) || Infinity));
          const demandMax = Math.max(1, shortMax, longMax);
          const yMax = Math.max(1, demandMax * 1.25);
          const xScale = (canvas.width - 2 * pad) / total;
          const yScale = height / yMax;
          grid(ctx, pad, axisY, canvas.width - pad, axisY + height, yMax);
          ctx.fillStyle = '#17211d'; ctx.font = '15px system-ui'; wrap(ctx, title, pad, axisY - height - 30, canvas.width - 2 * pad, 18);
          if (typeof drawDeflectionSupportMarkers === 'function') drawDeflectionSupportMarkers(ctx, input, pad, axisY, height, xScale);
          poly(ctx, samples, s => pad + Number(s.x || 0) * xScale, s => axisY + (Number(s.shortMm) || 0) * yScale, shortColor, 3);
          poly(ctx, samples, s => pad + Number(s.x || 0) * xScale, s => axisY + (Number(s.longMm) || 0) * yScale, longColor, 3);
          if (Number.isFinite(limitMin) && limitMin <= yMax) poly(ctx, samples, s => pad + Number(s.x || 0) * xScale, s => axisY + (Number(s.limitMm) || 0) * yScale, '#a16207', 2, [8,6]);
          else if (Number.isFinite(limitMin)) label(ctx, 'allowable L/' + (input && input.deflectionRatio || '?') + ' = ' + limitMin.toFixed(1) + ' mm, above plotted scale', canvas.width - pad - 8, axisY + 28, '#a16207', 'right');
          markLows(ctx, lowPoints || [], pad, axisY, height, xScale, yScale, longColor);
          if (typeof drawDownIndicator === 'function') drawDownIndicator(ctx, canvas.width - pad - 70, axisY + 8);
          legend(ctx, pad, axisY + height + 36, [[shortColor, 'short max ' + shortMax.toFixed(2) + ' mm'], [longColor, 'long max ' + longMax.toFixed(2) + ' mm'], ['#60706a', 'vertical scale 0-' + yMax.toFixed(1) + ' mm']]);
        };
        drawDeflectionComparisonDiagram.latestRevisionScale = true;
      }
    }

    function grid(ctx, x1, y1, x2, y2, yMax) {
      ctx.strokeStyle = '#d7ddd8'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y1); ctx.moveTo(x1, y1); ctx.lineTo(x1, y2); ctx.stroke();
      ctx.font = '12px system-ui'; ctx.fillStyle = '#60706a'; ctx.textAlign = 'right';
      for (let i = 0; i <= 4; i++) { const mm = yMax * i / 4; const y = y1 + (y2 - y1) * i / 4; ctx.strokeStyle = i ? 'rgba(96,112,106,.18)' : '#d7ddd8'; ctx.beginPath(); ctx.moveTo(x1, y); ctx.lineTo(x2, y); ctx.stroke(); ctx.fillText((mm >= 10 ? mm.toFixed(0) : mm.toFixed(1)) + ' mm', x1 - 10, y + 4); }
      ctx.textAlign = 'left'; ctx.fillText('0 mm undeformed line', x1 + 8, y1 - 8);
    }

    function poly(ctx, samples, xf, yf, color, lw, dash) { ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = lw || 2; if (dash) ctx.setLineDash(dash); ctx.beginPath(); samples.forEach((s, i) => i ? ctx.lineTo(xf(s), yf(s)) : ctx.moveTo(xf(s), yf(s))); ctx.stroke(); ctx.restore(); }
    function markLows(ctx, lows, pad, axisY, height, xScale, yScale, color) { const used = []; lows.forEach(p => { const x = pad + Number(p.x || 0) * xScale; const y = axisY + Math.max(0, Number(p.longMm) || 0) * yScale; ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill(); let ly = Math.min(axisY + height - 6, y + 18); while (used.some(o => Math.abs(o.x - x) < 95 && Math.abs(o.y - ly) < 26)) ly += 24; used.push({x, y:ly}); label(ctx, 'S' + p.span + ': ' + Number(p.longMm || 0).toFixed(2) + ' mm', x + 8, ly, color, 'left'); }); }
    function legend(ctx, x, y, rows) { let xx = x; ctx.font = '14px system-ui'; rows.forEach(r => { const w = ctx.measureText(r[1]).width + 54; ctx.fillStyle = r[0]; ctx.fillRect(xx, y - 12, 18, 5); ctx.fillStyle = '#60706a'; ctx.fillText(r[1], xx + 24, y - 4); xx += w; }); }
    function label(ctx, text, x, y, color, align) { ctx.save(); ctx.font = '20px system-ui'; const t = String(text); const w = ctx.measureText(t).width + 12; const h = 32; const left = align === 'center' ? x - w / 2 : align === 'right' ? x - w : x; ctx.fillStyle = 'rgba(255,255,255,.94)'; ctx.strokeStyle = 'rgba(23,33,29,.12)'; rounded(ctx, left, y - h + 6, w, h, 5); ctx.fill(); ctx.stroke(); ctx.fillStyle = color || '#17211d'; ctx.fillText(t, left + 6, y - 4); ctx.restore(); }
    function rounded(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }
    function wrap(ctx, text, x, y, maxW, lh) { const words = String(text).split(/\s+/); let line = ''; words.forEach((word, i) => { const test = line ? line + ' ' + word : word; if (ctx.measureText(test).width > maxW && line) { ctx.fillText(line, x, y); line = word; y += lh; } else line = test; if (i === words.length - 1 && line) ctx.fillText(line, x, y); }); }
  }
})();
  </script>
</body>
